body:
  text: 西郊笑端集卷二明董紀撰題瞻山賴實父詩集後天台賴善卿以其先伯祖瞻山詩集見示且貽書致其請曰最間翁已嘗題于集後矣子可以無言乎豫展卷閲之譬如玄圃積玉而又出於善雕琢之手珩璜琚瑀圭璋琬琰無施不可制作品度不失毫髮見之使人肅然啓敬不能不為之正容斂衽也夫詩自三百篇後變而為五七言盛於唐壞於宋不易之論也瞻山公以詩鳴寶祐間斯時斯際詩法壞已極矣公乃獨能卓然自為機杼成一家風骨百鳥羣中見此一鶚可謂回狂瀾於既倒者矣善卿素知詩於今之作者尚能采輯而俾傳於不朽况於爾家先聞人乎尤宜寶之雲東小隱記雲間胡彥恭去城之東三十里許買田築室隱居養親躬耕釣妻辟纑以資衣食嵗時雞豚之畜桑麻果蔬之給悉有贍暇則陳經史稽古今得失遇關世教者輒筆之或著為論解或發於歌詩以自宣其偃蹇抑塞之懷其他聲利事一不接于耳而汨於心也於是揭其所居之室曰雲東小隱而徴豫記辭弗獲謂之曰避世墻東者王應仲之隱也避亂遼東者管幼安之隱也張翰棄官則隱於江東杜陵間居則隱於瀼東今子居雲東而復以隱名之亦將以二三子同其迹乎彼二三子則皆以時與願違顧有所難為者故栖栖屑屑或逺或近或夷或陋遁世而無悶焉蓋非弗欲仕而固於隱也所遇則然耳方今聖明在上求賢如不及山林之士占小善者名一藝者罔有遺棄子讀書學古胸有竒略不仕則已仕則取冨貴如探囊中物耳子乃不由其易而由其難不為其常而為其怪固欲隱蔽絶塵於草莽之一㕓使非居雲東者皆將不得聞子之風識子之面焉視彼二三子者處亂世之為不己甚乎彥恭之言曰吾豈矯世盜名而弗仕者蓋嘗病夫躁進之徒其年未及仕其才未可以施於政不自量力度德一旦貪位茍祿鮮有不隳其職而敗其事者是以朝印綬而暮桁楊者有之昨日立朝而今日棄市者有之昔孔子使漆雕開仕而説其未能之對盆成括仕齊而孟子知其將見殺焉然則開之才聖人固知其可仕矣其所未能者則聖人所不知而開自知之括之才不可仕括不自知而人知之彼隳職敗事至死而無悔者由不自知其才之不可仕而仕也盆成括之徒也漆雕開則免乎此矣吾才不可仕人不吾知吾則自知之既自知之而復貪位茍祿是亦不量力度德也吾是以懼故處貧賤而安之非惡冨貴而然也夫處亂世知時之不可仕而隱者古人之高也處治世知才之不可仕而隱者吾之分也隱非盜名示不敢焉也何怪焉余聞其言而謝曰果哉子之志也隱居以行其義積學以成其德亦豈有不善者乎且夫小者大之漸隱者顯之基他日玄纁之幣求賢者之廬而造焉吾知其不在南山之南北山之北而必於雲之東矣是為記退叟傳退叟初居雲間之谷水自號雲谷暮年作歸老計結廬仙山號退叟人問之故則曰吾年踰知命既衰且拙知其時命退才力退心退於思智退於謀聰明退於耳目精英退於毛髮凡此數者莫非退之驗也吾是以號或曰叟之説不已局乎夫賢者藴之為德行措之為事業茍有可為之時雖磻溪之翁猶不以其老且耄而自泯於世今退叟又安計其在此者而卒弗進於彼也叟聞之曰豫非弗行其志者隱顯必由其道夫水行覆舟陸行摧車往將奚適見其可進知難而退可不慎歟鳳凰巢於高林蛟龍窟於深潭各得其所止而已凡吾所以如此者亦將處靜以固其分避危以圖其安抑豈為矯世盜名之迹也哉衆皆是其論且曰吾退叟者可謂高尚其事矣叟平日讀書自娛餘事一不經意然召之役則往役也又性好施豫産業不務廣益家有常稔之田千畞嵗給之贏族之匱乏者咸得以贍豫既嘉其言而又重其義故為之傳且以警薄俗也叟黃氏君澤其字云題西旅獻獒圖武王克商蠻夷通道西旅砥貢厥獒太保以為非所當受作書用訓于王夫以武王之德逺人向化畢獻方物宜也召公何以不然而諄諄訓之特慮其寶逺物而不寶賢則其所以為王慮者亦可謂深且逺矣史記載穆王不聽祭公謀父之諌而逞意犬戎雖得白狼白鹿以歸自是荒服者不至召太保之言其有不驗乎張貞期學龍眠筆法乃為此圖學之似與不似且勿論但不知當時繪此將使後世按圖而索之耶將使為之鑒而求訓戒也恨不能起貞期輩而扣其故後之覽者又豈可以尋常圖書而例玩之哉萬山隱居記鄭為開封屬州而滎陽汜水又為鄭之屬邑鴻溝在其西廣武屹其北其前則萬山疊翠其左則索汴合流實古形勝之地故其人物輩出往往多卓犖奇士今賈公時進青年負才真奇士也乃結屋萬山之中以釣以遊顔其室曰萬山隱居而徴記之僕曰古之人未嘗不欲仕也士之有隱夫豈本心哉各因其時而已矣彼南陽鹿門諸君子是也方今明良相逢占小善名一藝者罔不畢舉山林之間寧復有隱者子之有是名也奈何時進之言曰豫非弗仕者且豫先世皆前朝武辨纍葉簪纓澤施於人名昭於時至於今猶彰彰在人耳目豫不肖其於是有所未信未達而不敢起茍祿念得混迹於老農老圃之間亦足矣尚何論其他僕曰果哉子之志也以萬山之居之樂子誠可以隱矣以子之才之美又豈萬山隱居之人乎吁萬山之居得人而益彰人以萬山之居而益高子既出而仕矣宜發其所藴擴其所能上副聖天子急賢才之意下不負所學彼清泉白石黃花翠竹當俾山靈與之訶護為他日功成身退歸老之地與午橋緑野相輝是為記間處光陰記上海之沙岡有隱居為章文浩氏於其墅之西偏外齋之後鑿地為池壘石為壇樹以松桂旁有古梅碧桃柏夾拱池中畜金魚植嘉蓮池之上又作小軒通外齋以為遊息之所其廣三間袤則不逾尋丈花香竹色熏染几席雲影天光出沒闌檻幽閴寥敻不知有塵世之膠膠擾擾也因取少遊詞中語名之曰間處光陰而求豫為之記豫謂少遊雪月中人咳唾珠玉故其言雖淺近而意味無窮登是軒者覩其名而思其實一軒之義盡矣備矣雖然光陰一也豈有間不間之謂哉間不間此天之所以豫奪於人而人不能自必者光陰不知也人得其間不得其處則徒有其間而為虛度矣雖得其處不得其間則徒有其處而為虛設矣既得其間又得其處光陰豈有不假乎人者哉文浩好尚髙潔胸次蕭灑上勤賦稅之供下盡事育之責退而休偃於此避喧樂靜此豈非有得於間處光陰之所者乎至於風日佳時窗戶洞啓與夫二三郡人談名理討論往事或觴或詠或琴或奕或焚香讀書或啜茶觀畫無一不適其宜此豈非有得於間處光陰之時者乎且夫光陰者百代之過客也其在天地則無窮在乎人則有限以有限而言之古無今之日今無古之時文浩有見於此得所與時矣間處勿虛設也光陰勿虛度也如此則於少遊之言為無愧命軒之意為無負矣視朝暮運甓恐不堪事者今亦何在又安能以彼而易此哉文浩作而曰某雖不敏請事斯語矣遂書為之記祝洞天真人贈行詩序槖籥先生本神仙中第一流人也與豫相遇于京師者凡兩閲月往來密邇歡若平生一日來與豫别袖出四明陳協和吳門楊彛中輩唱和所贈詩纍而成什屬豫序其端豫展卷觀之其作者果一時名流其唱和亦一時盛事有如端紳正笏周旋中規折旋中矩者有如輕裘緩帶乘堅䇿良馳騁自得者有如裙屐少年之風流醖藉者有如甫掖老成之嚴毅方正者猶聲之有黃鐘大吕也猶味之有項上之臠也華新秋月不足為其光明粲爛也赤霄鳴鳳不足為其休祥嘉瑞也玉壺之氷不足喻其清金莖之露不足喻其潔也良金美玉不足喻其貴越羅蜀錦不足喻其文也先生挾此以歸吾恐不為鬼神所奪必為蛟龍所爭宜慎寶之勿輕以示人吾黨之士茍挂名其間者他日或能訪龍虎過升仙橋出此一笑均不為生面客矣畣陸宅之先生仰中承佳章賜教展誦數四使人如登庾樓造天柱而載酒赴約豈非至願適士寧有事掣肘不克預此盟為深可恨伯祥和季輩繼以來命轉告亦各以故辭衆皆若此則不肖豈能獨往負此良會曷勝惋惜雖然他日稍伺間暇當率諸公乘山陰之興相與登小海樓樓主必能呼酒勸客時紀亦能舉杯邀月奉先生壽何所不可又何夕而非中秋也竊聞陽春白雪人猶謂曲彌高和彌寡至如足下所作非惟寡和而真不敢和耳吾黨又奚可持雷門之布鼓耶併容後會以謝不敏使還略此布悃不備贈卜者陳彥立序古者卜筮所以決嫌疑定猶豫也大事則卜小事則筮然則卜之與筮而卜為尤重蓋以龜為四靈之一背陰而面陽上隆法天下平法地左右睛象日與月轉運應四時故其長於用蓍有所不逮也雖然龜固靈矣占之不誠斷之不明雖十朋羅列五總在前亦將如之何哉松之卜者無算惟陳彥立氏得其傳自祖若父以善卜稱至彥立猶著七十二鑽無遺策焉居近闤闠商販者踵相躡於門術以大售同業爭嫉之笑且排曰陳氏子年甫踰弱冠又且早失怙雖粗讀書其術豈有能過人者借譽搢紳間以增重爾不然造物副之也彥立氏聞之愈自刻勵不怒毁已者語人曰吾為晚進將逐利以活妻子學不自信而幸孚於衆人之有是言也固宜然謂我借譽者亦謬謂造物副之者又甚謬矣夫以造灼鑽卜者所同也其業同志有不同其事同迹有不同儒名而墨行夷言而跖心者皆然也吾能世吾業不能致人譽如有所譽者豈日使人賂於市歟吾能盡吾誠不能必自售如有所售者豈日使人要於路歟彼不察夫已而徒惡夫人譬猶玉工售珉不恥珉之不售而忌售玉者豈理也哉聞者服其言自是人亦無復議豫始來松識其先君子大有凡所疑必從之卜十無一失者大有沒復從彥立氏考其實無異先君子探索乃軼過之豫固已知陳氏之卜其傳有自來矣今年夏交翠翁周汝明二親遘疾並危殆醫與禱無毫髮效計窮不知所為彥立氏占之曰吉厲無咎唯當更良醫服良藥及冬自愈豫曰疾若此朝不謀夕尚能冀及冬乎彥立氏曰吾之卜一以誠未嘗敢忽即弗中將不復卜或信子能為我述之乎苐驗之已而果然嗚呼至誠之道可以前知天下之理未有誠而不明者也彥立氏知卜之為重知誠之為要不瀆其靈不昧其明感而必通用而弗違所言之的如射之中鵠也由此觀之可謂無負聖人立卜之意無忝纍世家傳之學彼同業者烏能知之豫於汝明有通家之契且又神其卜重其請故為之述焉噫使誠有可述不求於人人將自述之使無可述雖求於人烏得而述之以子之年冨力強志慤行修不當使人無所述也傳有之曰人而無恆不可以作巫醫子其勉之他日司銓衡者設為建卜擇人必將有薦之者此又當勉之毋徒曰卜云卜云靈龜云乎哉贈醫士歐陽子忠序自炎黃嘗味草木典醫療疾經方本草之書所由出欲民無札瘥夭昏之患其於天下後世功豈徒哉周禮則又設官掌之嵗終稽其成功尤可謂重其事矣降自西漢倉公東漢長沙公沿隋唐迄宋與元賢哲踵出而方論益著宜今之人用力半而功倍善其術也不難矣然而民命日夭醫道日偷何也由不務古先聖人設科之本意唯利之是圖故多冒醫之名不求盡醫之實索病於脈則狐惑而不知論治於理則狼狽而莫辨崇誇詐以為髙飾巧佞以為能定虛實於瘦肥質冷暖於疑似往往以藥石幸有功矜志肆欲以要厚報茍為不足悻悻然怒甚則詈而仇矣若是者奚可哉長沙歐陽子忠糸出文忠公好讀書敦禮尚義未弱冠侍其尊人來遊江浙遂寓雲間以醫聞于時業與人同而立心獨異邦之人凡有求治逺近莫不歸歐能致其及門者又為幸然其亦不以人之面背而二其心也友人陳良佐氏客居湖源感水土之異暑瘴之毒得痎疾而歸數月弗差羸憊且甚它醫皆技盡縮手子忠視之曰吾知病之有在矣邪在厥陰血也當某藥主之期十日效衆咸以為誕子忠乃大作湯劑藥進而病去半明日大減復明日又大減不十日果愈尅期取驗一如其言衆始駭服以為盧扁復生亦不翅過當以此獲大利子忠笑曰醫有道存焉何必曰利夫醫一也方論亦一也吾豈能外是道而自為之哉在他人則自不能盡其道可故吾之功雖有異於人者亦分內事也豈以利不利為言哉嗟夫歐君之言可謂知道矣視彼之藥幸中而責厚報者非天淵之隔乎使天下之人一以歐君之心為心則將聖王設科之意為無愧而斯民亦可躋於夀域矣顧不韙歟良佐之兄良器徴豫言以為歐君贈於是乎書松城鎮西廟修造疏伏以松江府雄據滄海上應星躔牛斗之墟鎮西廟安奉玄天內合靈象虛危之宿十萬餘家人煙皈向六七百載香火綿長門庭久厯於星霜梁棟莫支於風雨小道人近承縧帽盍展規模衆長者各賜帡幪重新矩彠殿宇挾修廊而列其庖湢齋房聮丈室而繚以垣墻非徒美觀實為具禮廪粟囊金若鬼輸天雨朽墁梓匠即雲屯駿奔此話興焉吾事濟矣聽鶴唳雲間而祥開金闕共瞻天上之尊看鸞翔筆底而壽紀丹書仰讃域中之大永祈恩施長固福田南橋明行寺鐘樓疏伏以芬茶梨祥開陸地蔣漢瑊捨宅之公案猶存阿蘭若聲響江湖五禪寺發軔之勛勞不少仗他釋迦老子萬分之力創於石晉天福五年之秋正據吳夫差三女岡相去古華亭六十里象龍蹴踏華梵昄依奈何物換星移忽爾樓崩鐘毁荷檀度復置千鈞之器合浦珠還懸栒簴欲崇百尺之梯鄧林材少雖曰廢興有數貴在主張得人新甫之柏徂徠之松豈能無脛而自至離婁之明公輸之巧定應唾手而可成大家運阿堵神通覿面見給孤長者蒲牢吼月聽鏗鍧上徹於重霄鴟吻撑空喜突兀復還於舊觀上延睿算下福黎元周汝明祭子冕嗚呼始吾之得汝人皆以為有子而相慶也吾年甫四十而汝已弱冠服勞幹蠱頗有助焉吾亦謂得汝之力果早而竊自喜也夫自擇師教汝至於長立擇德配汝至於有室雖吾為父之責固當為然所以欲遂其心者亦不易也汝能承我教戒罔或恣肆宗族稱孝鄊黨稱弟弗違吾志弗怠吾事雖汝為子之責固當為然所謂克謹其行者亦難能也嗚呼孰謂教飬至於如此遽舍我而沒乎抑汝之修短有數耶抑由我之不德而天奪之速也向之所謂可慶者今則弔矣可喜者今則悲矣嗚呼汝有少艾之妻襁褓之女未中道而路分抱貞心而誰與上使祖父受刃之割腸下使諸弟淚波之橫臆實何負於神明降斯禍之凶逆而今而後吾何意於人間世而猶言猶食也哉宅兆既卜祖瑩是祔遣奠有期永以安厝朱良佐祭夏叔明昔我先人與公久要義隆兄弟公年差少志投慮合肝膽相照如漆得膠如曲同調埀三十年情好靡失公為父行我猶子姪幸公有孫閨房淑質適我豚犬諧此家室念自丙辰先人早世以豫不肖人所鄙棄公於此時獨尚高誼教我益我視昔無替京華旅塵大江酒船雪浦寒沙霜城曉天趨役應務每共周旋剖決盤錯公當其先香白有窩緑隂有堂亭有三思閣有晚香左揖嵇阮右招山王暇日琴奕對景壺觴令子象賢麟趾鳳毛諸孫競爽珊瑚瓊瑶何以恱懌彩衣服勞何以甘旨味充上庖年近古稀體力彌健殘年飽飯無事相見夫何今春二竪生變醫和縮手藥不瞑眩拏舟問候至於再三别來信宿訃音忽覃行道齎咨我則何堪涕淚橫臆熱中如惔公既長往路隔幽冥豈無後人大振厥聲蒹葭有倚瓜葛有情寧不往來如公在生雲山蒼蒼海水茫茫去日易逺我思則長載牲于爼釃酒于觴三奠矢辭寸斷肝腸周汝明祭沈君佐九山之靈三泖之清神秀所鍾必育人英猗歟我公實惟其徴曰攸好德而康而寧年登耄耋明察秋毫早事廢舉富埒猗陶負郭相攸泉甘土膏有宅惟奐有木惟喬晚厭紛華退迹水南别墅聿興竹房梅菴紫芝為糧白雲為龕了悟昨非不嗔不貪子婦孝敬阻逺晨昏溫問絡繹安否日聞冕也何如忝壻慶門我之冢婦乃公令孫親親相顧義方敦睦不鄙愚陋待以刮目一朝禍起轉笑為哭我幾喪明公亦荼毒鼠牙無端復穿我墉有訴弗理訟終于凶公疾荏苒自秋阻冬限以縲絏候問莫通天地黯黑我行為囚訃音隨西匍匐莫由跋而望之涕淚橫流曷以寓誠蘋藻可羞祭朱梅雪人不可以先見而逆覩者死生禍福也孝弟行於家乃不免於高生氏之毒喙信義孚於鄉卒莫解於張誠氏之浮言能得助於他鄉之逆旅不能見容於其鄰之匹夫不審夷陵之謀而有渠陽之患不樂廣漢之生而有同安之死如死者無知吾為子慟而已如有知也子其自知之矣履乎其庭若聞乎聲登乎其堂若即乎容牲肥酒旨靈其降止詞短意長如之何勿傷朱孟文祭妻弟夏幼文雅度軒軒秀睂娟娟鳳出丹穴玉生藍田有子敬之風流如宗之之少年人皆喻夫荀家慈明吾獨以為謝家惠連目及五行而下詩成七步之先內不辱於父訓外不負於師傳茍厥志之弗違期所進之無前揆豫年之濫長甘避路於逖鞭有婦黨之瓜葛時獲親於笑言以兄禮而遇我不少矜於自賢慶宴爾於方來樂詠桃夭之篇雖疢疾之朕作謂少失於節宣每問候於平安冀弗藥而能痊奈醫禱之罔效愈荏苒而沉綿天既賦以是德胡壽命之弗延豈不樂於處世早脫屣於塵緣將召記於玉樓抑修文於九原慘痛重闈之白髮泣生堂上之椿萱塤獨鳴而無應鏡一破而難圓愁雲結而不開春色黯而無妍行道為之嗟咨况義涉於姻㜕今日奠于高堂明日送于新阡痛幽冥之永訣極豫心之悁悁哭有慟而不知迸涕泗之潸然俞仲基告祖祝文嗚呼喪欲盡乎禮祭欲盡乎誠此慎終追逺者之所當勉也兹者翦剃榛莽拜掃松楸履雨露之既濡感中心之怵愓將以明日甲寅奉母􅀈祔葬于先考府君之墓慎終追逺之事於是乎在不敢以不告尚冀明靈其默相之俾即于安無恐無驚不勝哀愴謹告周汝明祭親家馬叔能人不可以逆覩兮惟死生與禍福其萌隱而朕微兮乃彼此而倚伏以前時燕樂之方昌兮又安知遽有今日之哭公豈厭塵世而樂長往兮抑壽命之限局使黃金不得以鑄兮亦奚用平生之貯蓄且身後之尚紛紛多故兮恐難瞑乎九泉之目俶豫豚犬之辱與進兮才不及於坦腹謬中選於雀屏兮冀得承乎教朂胡奠鴈之未逮吉兮先緦麻之制是服豫時適羈縻於謫役兮廢奔臨為可恧逮跋涉而旋歸兮屬喘息之未復後吾慚而已無及兮痛黃壤之埋玉我牲既潔兮我酒既具情發乎詞兮白我心曲神其昭晰兮是鑒是燭朱梅雪祭陸榮甫衆任其詐公尚其真衆競以刻公獨其淳謙已待物敦親睦鄰生財有道貫朽粟陳子孫繩繩如芝如蘭具慶有堂和樂且安少長愈集問衣燠寒奉以甘軟承以色難逍遙相羊年甫中壽是頥是養宜適宜候何期二竪敢虐敢冦遂令吾鄉殄此耆舊我生最晚辱交忘年追感平昔誼薄雲天念之不見哀恫曷宣敬酹巵酒涕如迸泉周汝明祭太婆沙夫人稟柔懿之性藴賢淑之德系出萬戶侯榮嫓二千石紫誥鸞回華軒魚飾閨範雍睦閫令嚴飭罄三從應乎關雎稽諸禮合乎內則益以謙受慶由善積舉案敬輟斷機教良賢子賢孫咸知義方麟趾鳳毛煥乎文章金相玉質秀育閨房顧寒門之與華閥猶山垤之相望蠢吾兒之匪才幸中選於東牀雖問候之已通未登拜乎高堂宜後天而不老奈長生之無藥抑豈厭溷濁於人間慕清虛之極樂棄庭闈之定省竟逍遙於寥廓姮娥備廣寒之宴王母赴瑶池之約慨雲路之曷從徒曕仰於繐幕薦以肥羜侑以清酌寓哀斯文出涕沱若沙夫人落壙祭文母氏聖善生我劬勞欲報之德海濶天高丹旐翩翩白楊蕭蕭薤露凄其貞魂可招去日匪逺我思則長秀城東隅勸善有鄉吉協青烏厥土燥剛宅兆既卜兹晨最良玄堂乃闢宜塋宜域懸棺而窆幽冥敻隔千古萬古無改無易永訣一觴涕淚橫臆周汝明祭李公義系出逢掖𣲖分浙東儒術吏事博該兼通議論屈座中之客笑談生席上之風才未展驥氣猶蟠虹蔑視流輩如蒿如蓬於交友間遇我獨恭許諾必信與謀必忠自挈家以結鄰乃密邇而過從樂雞豚之同社期往來以成翁何浮言之無根胎實禍於終凶聞訃音而驚怛抱遺恨於無窮詣靈帷而薄奠空想像於儀容感平生而一慟不覺涕淚之霑胸祭朱梅雪積善之家必有餘慶如何善人招此逆橫兩遭播遷死不正命幹蠱之子亦顛沛而云亡鍾愛之壻又胥靡而不幸是使六尺之孤無託九原之目難瞑豈造物之不仁抑理數之前定嗚呼昔常有坐上之客今之能弔幾何人匪時俗之炎涼遽孰疏而孰親死者亦既多生者咸悲辛慨遺軒於梅雪忽其迹之已陳所以重興懷於既往慊豫誠之莫伸望靈帷而一慟涕淚若其沾巾周汝明祭陳良佐嗚呼事有可不可者在乎人而易見命有幸不幸者係乎天而難知不能盡其責而望免於咎者此事之不可者也盡其責而不能免於咎者此命之不幸者也在乎人者人皆可以自免係乎天者誰得而自保邪嗚呼自吾子之長萬石也當朝廷創法之始任重而才優孰不以為可孰不以為幸歟然其地在海一隅號為斥鹵私鹽賊盜竊發為民害者常常有之是以民愈困而俗愈弊棄業散亡者嚴法不能禁萬石之算其可以一一取嬴焉吾見其難為也矧其民率多姦凶貪計之徒結朋樹黨牢不可破其來有日矣往往搆釁尋隙賊良蠧善張喉肆吻求飽其欲茍無所獲伺人之出必極口羣吠非投骨以馴之則至咋焉吾益見其難為也於是乎前有逺輸之罰後有失期之愆其地其民之害果如此謂非溺於吾所見之難為者不信也雖則蹶資殫力求盡其責而望免於咎意其責既盡而其咎可免嗚呼竟不得而免之身死家破函旅骨於千里之外抑在於人乎抑亦係於天乎在乎人者吾不可不為之一慟係乎天者又不可不為之再慟也其知耶其不知耶周汝明祭沈德良并其姪大中禍福不可測死生不可料以兩家之凶變實可傷而可弔橫逆之來疾如飄風萬事轉頭霧散煙空並掃迹於竹林之遊竟失聽於華亭之鶴白雲之念凄迷黃耳之書寂寞九山蒼蒼三泖湯湯英魂可招來歸故鄉某情牽瓜葛義託松蘿而今而後云如之何載牲于爼實酒于斚三奠矢辭泣數行下父祭子洛容知縣董良用嗚呼父死子祭乃順正也子死父祭何逆戾也每念吾宗門祚衰薄纍世一息既無伯叔終鮮兄弟及我之身鍚羡自天始有三子一女鞠育教養恩斯勤斯而皆必其造就冀以昌吾宗汝長而質性明敏是以情之所鍾一在於汝養生送死之望尤在於汝也汝妹既嫁而先卒汝弟之少者亦既婚而早逝吾時非不痛其不幸然猶幸汝輩在也越自聖朝詔書屢下搜訪巖穴御史張侯以禮羅致而將升諸公既受命拜泣辭去吾時雖有别離之戚意汝或得近任吾旦暮茍未死可望汝有歸覲之日時洪武六年癸丑十有一月也海北諸郡夷獠雜居炎瘴酷烈有非人情所堪汝不逺數千里而宰彼邑其為艱苦可知自甲寅四月聞汝在京起行乙卯正月始得到任後九月書六月又因遞報知汝由茂名調洛容於貴州喪其僕𨽻吾謂汝在逺方煢煢孑立視其僕猶骨肉也汝失之何以為懷今年丙辰凡兩得書平安固為可喜而終不自樂以為徒能見汝書不能見汝面也况自汝去家三年凡所寄書皆因人之託而未嘗有信使來豈汝獨不切於顧家必其欲如是而不可得也因念洛容為栁州屬縣按圖經其地在古荒服皆昔賢貶斥之所汝今往居之而重以羇孤何其不幸歟抑嘗思之吾今年八十有一汝今年五十有三吾之壽命不長汝則限以官守相去又遼逺與汝無復有相見理若我死汝始得歸汝歸則我不及見汝矣我雖不及見使汝果得歸則妻與子皆有所託吾死何恨嗚呼孰謂我可死而不死汝未可死而死也又嘗思之何今年汝弟一旦汲汲欲為汝了尚平之債二男一女婚嫁俱畢非人也天也不然今日汝既死使男未婚女未嫁其不幸不尤甚於今日之不幸乎但恨汝生不得見其佳兒佳婦耳使死而有知亦可以無恨矣嗚呼汝之一生蓋棺已定雖曰瞑目化方不能與兒女子訣臨終之一語所貴乎得正而斃其視蒼梧嬴博之葬亦何慊乎哉雖然骨肉歸復于土魂氣則無不之也汝其有知來格來享祭父洛容知縣子名澤字時雨西芹河泊所官嗚呼父之云亡痛亦大矣而况於病而不知其故者哉而况乎死而不見其尸者哉此又不勝其痛也其於倫理無所逃其罪其於天地無所容其身蓋惟我考官宦三年身厯萬險甫得民於高涼復移化於荒服歸期淹以嵗月家奴殪於道路殊風異俗形影相弔舉目之所親誰歟可以與論心曲而慰浣離索者又誰也父母妻子之念或從中來欲見而不可得憂增憤結殆有不能堪于懷者安得不致疾易而衛生難也嘗記前年及春首之書有曰老景投荒未卜生還之理又曰彼此相望相念不能相顧汝等自宜樹立我之殘喘則當付之天命于時則已傷其言之過于悲口雖不言心則不能忘也竊自幸者猶以我考平日修身慎行德義無愆天真福善亦可免夫嗚呼孰謂通濟之别遂為永訣宜山之報遂為絶音抑人事之難必造物之難知也誠知其如此則於向之叔氏議遣偕行之日安得聽父命之不許而忍逺離膝下耶噬臍之悔萬死無及雖書策琴瑟儼然手澤之如新居處笑語僾然聲容之如在終不得見其可畏之威可象之儀矣嗚呼痛哉今則耄耋之尊倚門而何望寡弱之母舉案而誰敬顛連二孤身何託以自立家何賴以自理也號天呼地五內分裂奈何道阻而且長時難而復歉未克迎柩以襄大事所以束返魂之帛立依神之主斬衰既服爼豆既陳至誠之感無不格焉也神其鑒之嗚呼痛哉伏惟尚享祭兄洛容知縣痛哉吾兄之未可死也為人子父母日薄西山養生送死之責有攸在是未可死為人父男不知有室女不知有家羇孤之身越在萬里亦未可死至如抱德負藝固當享其祿而永其年仕不過令長年甫五十有三皆未可以死而卒至於死豈不痛哉伏念吾兄生平學行過人而素無宦情及膺連茹之辟辭不得命逼迫上道然且徘徊顧望猶有乞身歸養之志暨乎出宰南海轉調百粵皆非獲已去家三年凡四得書惟由宜山者為甚悉且云稍待縣事清簡當自遣信還平安之報冀在乎旦暮焉至嗚呼孰謂患生不測而乃猝然有此凶問乎上使埀白之親頓絶倚門之望下使零丁二雛終不得聞過庭之訓矣所謂天道者誠無知造物者誠無情也嗚呼吾始有同氣四人不幸而先哭吾姐繼哭吾弟家門雖多故尚可以扶持而濟乎艱迍者賴有吾兄弟二人在耳癸丑之冬兄出弟處西南東北各天一方彼此憂勤形於夢寐猶冀秩滿有日角巾歸第相與奉歡笑於親庭共徜徉於田里也嗚呼兄胡為乎復棄我而先殞乎病而吾不知時死而吾不知日殮不得慿其尸殯不得扶其棺逮聞乎有喪又未能亟遣嗣子往迎旅櫬而徒繫風捕影召歸魂於倣佛而祀之室堂也而今而後吾亦復何意於人間世哉雖然資父事母不敢不勉此外則當事嫂如事兄視姪如視子庶幾有慰精爽於冥冥而不愧於天也嗚呼吾言有窮而情無窮其知耶其不知耶西郊笑端集卷二
