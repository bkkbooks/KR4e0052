body:
  text: 西郊笑端集卷一明董紀撰日重光行日重光日日向西沒朝朝出東方日重光誰目爾名為太陽當時羿射十殺九如何爾獨箭不傷日重光浴乎咸池拂榑桑周天不停照八荒人歸長夜臺長夜一何長日重光混沌初分有盤古爾今獨在盤古亡日重光東方天又明叶夜臺自冥冥叶短歌行山鳥日日喚提壺勸君酒盡須更沽千金五花不足惜莫計囊中錢有無人生百嵗幾時好大是愁多歡樂少朝見開花暮落花昨日朱顔今日老為君起舞為君歌當年不樂奈老何春閨曲重門半掩梨花院博山飛煙繞梁轉曉鶯啼傍小窗來只在栁梢看不見羅衣單薄惡春風却要捲簾令燕通春愁只能清臂玉何時得消紅守宫對花強揀花枝折心事可向旁人説薄交行古人結交能結心雲天爭高海同深許身慷慨死知已一諾不翅千黃金近來此輩交難託昨日尋盟今背約動於利害計秋毫未及春風已霜落薄交薄交奚足嗔莫望今人似古人鴻門會卯金刀先入關不合楚人意楚人力拔山氣蓋世言可食盟可棄四十萬人皆勇鋭張子房別無䇿抱竒貨臨不測重瞳玉玦光相射坐上龍顔如土色使落當時舞劔手安知誤人非項伯嗚呼鬼朴猶怒唉未疽身已病是何竪子不足謀四百開基有真命霸上立殺曺無傷玉斗一聲分漢疆來日大難來日大難誰汝憐頭白面皺命弗延早知大難學神仙不食煙火無死年王喬八公術可傳蓬萊採藥無樓船不如即時有酒據眼前一醉可以通大道合自然無事長歡笑荷鍤相隨不須弔營營以朝暮壽比籛鏗亦虛度拜月詞畫堂紅影搖銀燭繡幕圍春香馥馥晚粧著意新梳沐梨花月上闌干曲闌干曲掃花陰氍毹席地朝月拜夜夜願得長如今烏夜啼青桐月仄烏夜啼銀河倒轉紅樓西蟲聲唧唧在四壁麝蘭煙裊金狻猊碧紗盈盈風暗起銀缸吐花十分喜試將鴛錦計短長恰好裁為合歡被合歡被縫不成金斗無溫剪刀冷細意尉帖難為平沉吟停素手相思情轉多看罷回文字粉淚濕香羅霸上軍三綱陵夷秦失鹿天下紛紛競追逐白蛇當道毒傷人神劔一揮蛇母哭素車來降軹道旁諸侯有約當為王悉與父老除苛法約三章倉粟既多兵有糧不勞獻饗持牛羊逆理則敗順則昌何必猛士守四方君不見弒義帝屠咸陽陰陵失道嗟天亡望夫石昔此與郎别此是郎歸路望郎不歸幾朝暮當時恨不隨郎去今日知郎在何處妾身化為石恐郎歸來郎不識石眼有時開郎面何時覿石淚涔涔土中滴鬻女謡余嘗讀兩山李侍郎鬻孫謡意謂昔時養民厚俗之政大備宜無一物不得其所何至使人有此者不無惑焉鄰人張氏鬻女其事頗與此類不意於今目及見之作鬻女謡東家夫婦無丁男止有兩女冬猶衫客來又議鬻其一父母不忍聽兒談長云弟幼我應去幼謂我去兄當住心知父母非不慈不然租稅從何措兩兒去住爭未決父母狐疑客催别大兒行泣小兒隨道旁觀者皆嗚咽四時詞日高繡櫳花影滿流蘇不動香雲暖春來欲睡起偏遲猶自向人嫌夜短墻外秋千士女嬉海棠開傍禁煙時金籠鸚鵡新調舌學得回文錦上詩象牀翠拂瀟湘水碧紗如煙吹不起珊瑚雲枕七寶粧玉山自倒冰壺裏荷花鸂鶒銀屏光扇車風來薇露香佳人雪手捲輕翠荔枝壓漿調蔗霜露下碧梧巢鳳寒悲螿暗啼金井闌風吹繡幃羅袂薄琵琶冷落無心彈誰家月明正搗練十二闌干愁倚遍錦水鴛鴦不獨栖芙蓉一夜生新怨江天欲雪雲已同畫堂和氣春風中銀鵝金鳳盤翠沓肉屏光照氍毹紅熊掌駝峯羊尾酒錦箏寶瑟如荑手燭花落翦香半奩銅壺滴漏三更後織布謡朝拾園中花暮作機上紗婦織不停手姑紡不停車園中花有盡蟲螙兼風損茍遇商販來騰踊價無準經多愁緯少買花連夜造不惜斤兩過且要邊幅好門前索租賦催錢又催布細意織得成猶恐監官怒年飢負私債錢物無稱貸擬儘納官餘抱布城中賣城中布雖賤得錢圖得現不恨利輕微但願身常健舉家忙不已一絲難上體錢布汗血成監官莫輕視鳳鳥何不至鳳鳥何不至碧梧空好枝百世一巢阿千年一鳴岐雖云有其名誰得常見之余生去古逺仰愧聞而知仲尼歎吾已楚狂歌德衰燕雀爭高騫白日喧梟鴟簫韶在虞廷此物當來儀問天顔淵短於命盜跖終以壽貞亷迫虀鹽淫富酒肉臭姦凶惡不報良善吉罔佑蘭蕙花易衰蕭艾根易茂雖云物有數天意實大繆賦豫亦既偏視聽復貿貿是非竟何在斯理孰可究問天天不言納納自昏晝螳螂捕蟬歌蜘蛛網破蜻蜓走燕子穿花避鴉舅幽人睡起靜中觀更有蟬聲在高栁螳螂捕蟬蟬未知黃雀又擬螳螂後兒童調黐欲黏雀竿動雀驚兒縮手須臾螳螂亦引去彼蟬蚩蚩得無咎世間萬事無不然人或設機天却否莫將間慮挂眉頭不如且進杯中酒採桑曲清晨採桑露如雨妾身本是良家女使君有婦妾有夫妾請使君聽妾語人生節義重移山一女二夫非等間秋胡黃金道旁意直見生死嫌疑間不惜朱顔鏡中老只恐蠶多葉稀少蠶多葉少蠶苦飢蠶少不堪衣債討朝桑暮桑欲如何繅車未停催上梭無心巧粧濃畫蛾鏡臺蛛絲縈網羅存介齋針有序華亭劉克讓揭其齋曰存介時名賢咸賦詩一日持卷來徵余言作存介針人或未然我審其幾人圖已然我防其微靜而能慮動則弗違避惡如仇從善如歸毋蔽爾明視於無形毋塞爾聰聽於無聲悔吝先覺咎從何生是謂存介慎保令名讀書莊為張夢辰榆栁蔭我門蘿薜網我屋開窗與山對逶迤見深谷風來地如掃雲傍簷下宿藥苗青蓋畦桑柘連村緑半間鶴平分清玩靡不畜縱橫列左右畫卷雜詩軸無侣酒一壺有客棋再局好琴棄書置惜書典琴贖筆牀乾燕泥茶煙暗溪竹同遊半紆紱諸弟皆食祿經年不入市鄰曲還往復黃雞啄黍肥今嵗畬田熟新春已儲庤機鳴絹盈柚衣食在溫飽官賦期早足理亂既不知亦竟忘寵辱白頭抱遺經自課兒曹讀六有齋沙岡俞子誠氏名其齋曰六有蓋取橫渠張先生告其門人尹氏之語謂言有教動有法晝有為宵有得瞬有養息有存也學士大夫咸詠歌之求余品題為作詩一首人性靡不善至理無古今苟能希聖賢彼心即吾心升高必自卑厯淺當就深莊嶽置數年楚子亦齊音我友清老裔超然脫塵簪揮手謝聲利耕鑿東溪潯延師教孫子買書不論金暇日私緒餘聞善意所欽六有用名齋佩服作規針言動慎躁妄日夕思無淫以兹瞬息微存養防牟侵仰止敢或懈常若橫渠臨春風扇微和涼月敷清陰幽花拂簷舞好鳥當窗吟于時一壺酒自酌還自斟其中有真樂樂向其中尋人居天地間人居天地間所遇皆我宅視宅已如寄視身又為客百年猶苦短何况不滿百不生竟不死有失因有得造物既如此多言愧緘默次韻全希言學士慎言玷可磨學道堅可鑽堊盡鼻不傷唇亡齒先寒得喪本前定居俟何後患終南徑雖捷蜀道行轉難至理豈云逺在人方寸間錢舜舉捕魚圖脫蓑挂船尾鼓枻坐船頭得魚既換酒欵乃揚中流妻兒冒短篷喜無風雨憂日暮向何處白鷺古時洲古意妾心石中玉郎性風中花花飛自不定玉潔終無瑕不照妾心潔不如棄道旁任郎輕薄性飄轉隨風狂次韻樊文淵郎中四首老驥志千里蟄龍卧三冬嵗寒知後凋惟彼柏與松所以古君子韜光養疏慵時來意氣得叱吒風雲從莫操齊門瑟莫投光範書孔明有知已自顧南陽廬藴真玉混石失勢龍為魚君看才名誤文園老相如堂前可栽竹墻下可樹桑更祈廣阡陌稼苗無害傷治生喪亂後真如反屠羊冨貴非所願淳風仰羲皇東家哭未已西家復悲啼出門問何故役夫行别妻少壯既從役誰當荷鋤犁歸來掩空室念此常栖栖晚翠軒逺山沐新雨秀色如澱潑紅銜日半邊紫帶煙一抹浮看衣欲染淺訝眉初刷彼美軒中人相望眼開豁次韻畣林彥恭并柬王參議二首二卵疑茍變五皮致百里用舍各聽天在人何愠喜求全造物病鑿竅混沌死營營彼何為萬事同一理陽春既寡和聒耳皆下里梟鳴何足怪鵲噪未必喜日及夜方開蜉蝣暮不死近觀衆物情變滅無定理風木軒為丁季悅有生非無母失恃才五齡已慚泣杖俞徒慕刻木丁誰知樹欲靜無奈風不停終身罔極悲年年墳草青過七里八岡黃昏宿山店雞鳴起晨炊風雨亦戒行恐失公家期陸行多泥塗山行多險巇下高甫平地及前復乘危七里過八岡車頓僕已疲候門多稚子衡門足栖遲自非刺史薦逺道來胡為西郊儼松菊敢賦歸來辭槐雲軒槐之雲兮團團欲雨不雨兮其陰夏寒彼世之人兮汗馬未乾吾方髙枕兮南柯夢還槐之雲兮人所愛覆我屋廬兮如幢如蓋山作平地兮桑田變海吾視其下兮蟻穴猶在自釋有天即有日在人生稟先未形開闢後已具混沌前天運如磨轉日行猶蟻旋夜夜向西沒朝朝出東邊今日復明日不知幾流年大率百年期三萬又六千其間陰晴外一半夜相牽天地自悠久人生皆茍延七十猶古稀况可滿百焉但見世人死不見日離天聖賢何異人虛名身後傳生前一滴酒安能及黃泉往者既如此我何苦憂煎怡顔軒為夏長文御史孤松出巖阿性豈好奇怪長材受屈抑偃蹇為此熊髙人識物性拔置軒檻外俾全凌雲勢蕭散極自在種樹如種德所貴厚能載欲令枝葉茂要在根本大以兹奉親夀目到心已會欣然坐忘倦軒宇增爽塏月明看虬龍風過聽竽籟昔同羊棗嗜今比甘棠愛嵗寒三友間此友交獨耐茯苓煮醍醐艾納薰馣馤櫩花落香粉庭草蔭書帶洞啓南薰窗一笑豁晴靄養正齋為沈一中幽齋絶氛囂獨擅林塘勝野色納虛舟天光墮明鏡囊琴手親斫世事耳慵聽免移北山文恥捷終南徑洗心玩周易持志企鄒孟惡名忌食蒿亂樂思放鄭栖鳥安巢居遊魚遂川泳雲開月自朗風止樹還定順理多所得與物更無競不假身外求由來復初性葵軒為平恩尹蘇德輔菊遇陶靖節蓮遇舂陵翁菊取隱逸意蓮有君子風嘉話至今傳所遇非虛蒙卓哉蘇平恩襟期古人同植葵用名軒勉兹培養功眷焉舉可則樹德匡厥躬進此正色黃逺彼亂朱紅夕萼知向西朝葩還附東衛足喻吾智傾心喻吾忠拳拳愛君念對之彌敬恭牛腰冨品題千里走詩筒葵遇視菊蓮未必慚二公花若敷而榮軒若增而崇勉旃名軒義有初期有終江南多荒山江南多荒山無名亦無數於民弗宜耕於官弗宜賦不生靈芝草不産松桂樹崎嶇復崎嶇總是不平路昔謂山可愛今知山可惡何時雙眼開得見無山處存耕堂為維揚李廷仲愚者務兼并良田亘阡陌苦作子孫計貪心猶未塞有田不自耕安能知稼穡但見家不訾大小生驕佚殊不曉此田乃是無情物百年三易主到汝知幾易一朝天不佑復為他人得李公維揚彥高世有絶識喪亂二十年所向無定迹或寓南山南或僑北山北豈不念子孫為置美田宅積金與廣業視彼皆下䇿惟於方寸地平居常種德詩書即耒耜仁義乃溝洫利欲比稂莠孝悌為黍稷既無水旱憂寧假耘耔力冨勢不能奪螟蟊不能賊一氣涵至和沛然有餘澤蘭芽茁庭砌玉樹森相植家訓重義方弗效于墻鬩高堂日清晏燕樂宜酒食坐上無白丁談笑盡逢掖封胡與羯末侃侃咸侍側父災子肯播慈顔喜盈色大書特書之世作貽謀則折楊栁攀折道旁栁相送道旁人行人視無用棄擲隨車塵折來既棄擲贈之有何情本不管别離别離情自生三復章臺詞再和陽關曲舊恨與新愁幾換依依緑不如且休折留與歸鴉宿但使樹多陰歸鴉來自熟次韻答陸宅之兼柬鄭有孚西墅方黔突東皋復結廬藏修為上䇿覆墜戒前車瓜地鋤成町苔磯坐或漁種花須帶土斷竹更開渠世俗高無比林泉樂有餘傲風涼幕捲掩月夜窗虛故步惟稱獨清談每起豫習池存倣佛蜀道免崎嶇不見令相憶那堪歎索居多煩谷口鄭道甫問何如立春日偶書我生行年四十五去年失恃今何怙四人兄弟一人在敢嘆零丁與孤苦家貧無田惟有書讀書未遇將何如不農不商又不祿百事無成生計疏大兒癡頑無好習見人懶作低頭揖小兒學語未分明近始扶牀能獨立山妻抱兒認父面願汝父子長相見但令骨肉在眼前到老不嫌貧與賤紉穿補綻無時息晝紡綿花連夜績食指衣身纍轉多頭焦鬢秃空啾唧婢較初來過半長手拙未解調羮湯學攻針線更遲鈍兩日一袴縫三行蒼頭入門懶無匹面垢腳朘常菜色使令內外豈云無自然不得分毫力破屋數間如玉川牀頭舊物餘青氊愁來就枕且醉眠萬事得失皆由天蠟月十日大雪有懷去年在會諸友時臨清已死洪洞荆南俱為遷客梅雪繫獄嗟嘆不足形諸歌詠以寓感慨之情云耳去年西郊三日雪故人滿眼情歡悅相邀不愧竹兜寒酒後酣歌耳還熱今年西郊雪又飛故人故人胡不歸公冶縲絏竟何罪藍關去馬音書稀臨清官間陶謝流造物乃與人為仇延陵欲挂樹頭劍不知何處尋荒丘此時盡為豐年喜我思故人愁未已忍向今年説去年未必明年更何似何如野老住深村二首伊喔寒雞啼未了人在霜天待天曉儀禮喧呼已唱名猶怪朝官來不早馬上公卿兀殘夢手冷青絲無力控酒醒未得半夜眠又被紗籠催走動何如野老住深村日高丈五猶閉門此行敢謂儒冠誤進步青雲登仕路不投光範一封書底用蓬萊三獻賦雞鳴待詔留金馬日仄拜辭丹陛下獨持使節瘴鄉來性命鴻毛身土苴何如野老住深村一生不識州縣門挹翠樓為周彥章元龍豪氣高百尺眼界只嫌平地窄小樓窗戶出林開面對好山如好客好山可望不可招或若有意來相朝世間萬事迹易掃惟有山色無時消蓬萊之股疇割左似是天邊落星墮偶然喚作大小金十二峯頭青朵朵樓中看山無厭時陰晴朝暮總相宜何須他求賦挹翠倚闌滿目無聲詩幾家有樓能看山有樓無人如我間山外看山山更好反勝俗子居山間趙文敏公畫馬君不見良馬出自余吾淵體流赤汗口赭涎目如華星走如煙雞鳴鞴越夕稅燕天地不足相周旋親隨真龍飛上天乃在元狩之二年奚官鞚引丹墀前錦韉玉勒黃金鞭重價不售如山錢玉山之禾新甫柏為芻為皂聲籍籍當時圖寫豈無人神駿不傳空自惜開元畫馬誰稱首曹韓並駕真希有歘見驊騮筆法親孟俯王孫今絶手看畫非難識畫難此圖未許常人觀眼中有畫始知畫但恨世無楊契丹子猷訪戴圖為朱梅雪題壁清夜開門滿山雪梅雲淡鎖朦朧月迸泉走突澗底冰空谷應聲如石裂此時此景天好奇天發人趣人無知自非子猷殺風景剡溪寂寥徒爾為扁舟乘興亦草草興盡何須見安道當時不見故云高若使見時無此好高軒素壁瑩如練乃有徐卿塗抹遍千載山陰一笑端髣佛於今畫中見感廢桑田或時變成海古來人物今誰在燕入烏衣巷陌非鶴歸華表居民改王家冨窟石家樓至死貪求未肯休金銀成堆珠論斛一朝盡屬他人收獨立西風重歔欷回頭不忍分明視荆棘叢邊瓦礫場亦是誰家歌舞地平生兩眼醉復醒看盡人間幾興廢三味軒為張瑞卿人莫不飲食所病知味少惟有江東老步兵世味深知見幾早菰嫩兒臂白蓴香叉股肥鱸魚更堪膾四腮天下稀人生貴適意冨貴將何為萬錢下筯空暴殄千鍾食祿多憂疑當時豈真為口腹直指秋風作題目敢言主簿死銅駝華亭鶴唳傷都督步兵上天家法在子子孫孫今幾代侍郎夕食止蔔匏此云三味猶嫌汰見在生前酒一杯何如身後名千載送羅照磨之官廬陵我昔觀風十載前繡衣光耀西江船賣劒歸耕十載後君向西江我折雲間栁西江水日日清西江月夜夜明願君之心如水復如月洗民煩寃照姦譎賢才為政效驗多要聽一一歸來説親戚情話詩并序故人俞原肅不逺數千里自武功來歸訪親舊於二十年後如殘星之落落存者無幾其弟原魯已物故原舉挈家仕逺方惜不及見惟原魯妻子在鄉里及見耳况原魯續絃凡其有所出皆别時以後事今所及見則為易世矣余故作是詩以遺之故人前身丁令威去家多年今復歸江山如舊城郭在宗族易世鄰人非弟婦從來未識面升堂敘禮還相見呼集諸孤伯父前舉觴逐一殷勤勸為言夫主去從軍五載音書絶不聞人生有死亦何恨最苦軍籍名猶存丁男未大要補役往往移文催不息紀録申鳴續有條案吏無錢行未得期功強近希誰助叔在旁州守墳墓今年兩度寄聲來又作長淮幕官去零丁薄命止一軀况乃纍嵗多艱虞殘喘雖存食指衆自度何以全諸孤故人低頭聽説罷不覺吞聲淚盈把我今自是羈旅人有䇿安能救孤寡雨瀟瀟戲而有所贈雨瀟瀟泥滑滑風如刀耳如割行路正難行行人欲愁殺馬上顧舟中貴郎遇冨翁驅馳莫相笑同是路途窮冨翁舟中無坐立貴郎馬上氊衫濕腰纒十萬受此寒不如在家貧亦安擊壤歌言民樂有賢令尹而美之也二首姑緝麻婦紡花丁男在田女在家吏卒不下鄉官無橫科差老翁㺯兒孫逐影向壁拏東鄰酒西鄰茶從朝至暮笑呀呀布穀昨夜鳴村村補桑麻不違農作時今年落秧早愛民如子縣令心無事擾民如此好夫撒秧妻採桑農事已興蠶事忙大麥䔿䔿秀小麥菶菶長菜花半稀青間黃今年縣官好官役不下鄉田家得安業出入無驚惶日力豈敢嬉夜共燈燭光催了機上布便是囊中糧飢寒庶可免逋負亦可償不患心頭損新肉只要眼前醫舊瘡中秋對月天長地久無年數已往中秋知幾度世人看月自古今月色年年只如故一年一度看中秋看去看來今白頭不如有酒酹明月更能幾度登高樓己巳正月十五日雪中懷仲基公子臘前不能分寸積才入春來便盈尺徹夜東風吹不消太陽無光雲四塞莫問宜多與宜少豐凶未卜為何兆江山圖畫若天開人境一時誇絶好故人只隔瀼東西近似山陰到剡溪乘興出門還興盡此時應已醉如泥短歌行次韻俞仲基君不見朱門空鎖春冥寞粉墻影斷秋千索昨夜歡娛今已非空有間花自開落人生何必多苦思得失興亡俱有時捧心嘗膽事何異越看勾踐吳夫差館娃姑蘇極佳麗䇿獻西施比魑魅機深烏喙亦徒然蜀道難行却云易朝為桑田暮白波此理誰知藍采和少年不飲復不歌百嵗光陰能幾何金仲宣畫上方樓閣層巒顛鐘鼓髣佛雲間傳丹梯有路容一到伸手便可捫青天霞標東望赤城近水光下瞰瀟湘連褒斜潛通子午谷瀑布倒挂香爐煙曲闌回磴走千轉合抱長松知幾年衣冠何來抱琴客莫是避世商山賢夕陽殘釣催罷去西風快帆爭後先金郎筆法擬北苑咫尺萬里多清妍高堂看畫動歸興明朝亦理松江船送黃師古歸鳳山賣藥鳳山之雲如鳳起鳳江之水清無滓山中美人黃石孫面山結屋臨江水家傳一編圯上書讀書不為章句儒年已三十未有鬚學識逈與常人殊春風杏林紅繞屋石田夜雨參苖緑松花釀酒壓流霞茯苓煮飯抄香玉賣藥不較利重輕丹砂煉得黃金成伯休自謂人不識何事女子猶知名去年俄膺太守薦歘然聲價超群彥南城最喜得賢才無異昔時三語掾金陵逆旅相逢日舌似瀾翻目如漆胸中耿耿不得平肯復區區事刀筆促理歸裝買吳榜囊無一錢膽何壯三十六䇿此為上能作良醫比良相采石夜泊江月寒生千尺暈江聲暗流千古恨謫仙醉魂招不來月在青天誰與問放歌把酒蛾眉亭白露灑灑風泠泠無人然犀照幽怪夜靜魚龍還出聽遊山聫句洪武乙丑嵗三月十有七日仲基俞公子舟次西郊之上邀豫遊干將鳳凰諸山偕行者五六輩俱清淡風流是夕抵中山之淨行寺登半雲亭訪棲霞樓遺迹主僧設茶供具蔬筍意甚勤欵以其拘浮屠戒初弗置酒衆皆索然無歡仲基命舟中取一壺就酌酌之無算酒盡更續顧謂豫曰今日之會樂甚不可無一語以識嵗月豫欣然捉筆率在席之能詩者相次聫句得二十韻明日客請録之故序其略于篇首云時同賦者仲基之兄原魯弟季明其三人則朱良佐氏陸德輿氏洎豫董良史氏也皇帝十八年立夏前二日煙消雨開霽史天朗雲獻矞舞雩詠既罷魯蘭亭會方畢農人將勤動史我輩俱暇隙良辰每難逢基樂事安可失放舟中山寺明借榻半雲室登臨戒匆匆佐厯覽期一一鳳凰飛不去史干將對相屹輿仗此泉石緣魯已我煙霞疾評詩遇支遁基看畫思摩詰史茗瀹先春芽魯香集逺方物史空谷應羣響基清風生兩腋庖厨絶葷羶明杯盤示真率錦棚脫稚子佐火劑供崖蜜史蔬品芥臺辣魯餅饀藤花馝史點籌督酒令基挑燈檢書帙史賭聫彌明句明窘閣侯喜筆史墨枯草書滯韻險奇語出魯談禪石點頭促席月在膝同行盡能作兹遊可無述史次韻俞仲基寄顒天際有序法出姦生古今之通患法出於上姦生於下法者上之所以禁民為非者也天下之公道也姦生者下之所以倚法而為非也一人之私心也下不能逹上不得聞法何由行姦何由止豫嘗欲建白于朝有志而未能者也天際顒上人乃叢林之師德戒行嚴謹不外教律卓錫于兹有年矣或有倚法將脅之者師聞之度無以塞其欲不與交一語竟出走衆遂咎脅者彼亦自悔而止師出久不返故舊乃相與遍求之得師所在復迎師歸吁姦之為患一至是乎向使師不出走彼脅而不從必誣之官官不能察雖佛出世亦不能不中其姦謀而陷於不義矣其他有若是者又可勝言哉仲基作家有詩寄顒師於豫深有感於是亦次其韻以俟觀民風者采焉君子當避路狐狸正縱橫日月雖麗天不照覆盆明顒師釋門老久斷世俗情黃金來布地白馬先馱經書逼智永真詩得惠休清貪嗔了不起怨尤何自生彼心或有競我意終無爭猝然跖犬吠猿鶴還失驚此輩逺為貴何須問君平曲直與是非鄉邦自有評及歸輿人喜裹茶就師烹仰笑看中秋幾何虧復盈紀夢夢中挾飛仙與我肩相齊手持緑玉杖腳踏青雲梯彈指天門開天家難久稽培塿視三山九州一丸泥蓬萊自清淺海水忽流西金雞半夜出又向扶桑啼次韻俞東村雨中見寄九月風雨交秋色已云暮砰湃驚波濤冥濛雜煙霧排兵蟻方酣逐婦鳩轉怒燕去承塵空馬躓障泥汚斂揫縮衆手飲啄飽羣嗉鬼愁陰多哭兒聞夜常怖涼生墨池魚潤逼管城兔憂懷不可適髙情尚能賦昔人種樹昔人種樹時樹小花未開今日花滿樹別人看花來花開今幾度種樹人何處把酒對花傾問花花不譍花開還又落酒盡須更酌只換看花人年年花自春季子延奴初學語見書帙在案時輒作嚅嚅唲唲聲若解誦然以其不由教而能爾故喜而賦詩且以示浩使知有所警云小兒不識無與之攤書學誦能嚅唲他日賢否未可必眼前便作聰明期人家愛兒如愛寶不願兒多願兒好無兒所憂在未得生得癡兒被兒惱我年日壯始得男至今空年十二三紙筆不好懶無匹正類豚犬令人慙阿奴碌碌已如彼滿謂興宗當在此君不聞杜陵達道笑淵明有子賢愚何足齒遊觀音山簡主僧大用并范彥華兩山出雲氣衆山自開晴遊人看山來浮舟繞山行舟行雖可意未愜登覽情捨舟入山去山僧出相迎問豫從何來謂豫欲何征殷勤待逺客茶香石泉清范卿文正孫解后詰姓名自言在山住歡愛如平生追陪極遐眺高步凌雲輕細路曲穿嶺旁出猿猱驚千里析秋毫所向雙眼明靈巖見孤塔去鳥投天平風帆太湖口煙火夫差城滄海東南流青天西北傾後巘方獻奇前崿巧已呈何當廬澗阿聽此潺湲聲塵襟正披豁落日催歸程悵然别二子私與煙霞盟次韻俞仲基孔聖在陳日行槖枵然空由也雖愠色君子當固窮靈公問不答一去難牢籠春秋明王道周南存國風筆削示來世斯文代天工及門三千徒盡若麻中蓬其功過堯舜萬古誰能同吾生恨獨晚束修諒難從私淑誦其書拳拳仰儀容樗散軒為戴彥文椅桐可琴瑟楩楠可梁棟斧斤日相尋出類先自送問之胡為爾不幸材有用膏以明受煎象以齒喚痛我生本樗散何必人器重規矩既弗就繩墨諒難中雨露極滋長土力暗培壅擁腫與拳曲此意殆天縱其下根株連其上枝葉蓊風過鳴笙竽月明舞虬鳳商丘暨櫟社氣勢相伯仲棼槐作奴視莊椿等兒㺯併移八千春同一南柯夢掃壁醉留題掀髯對樗諷與張夢辰陶九成姚比玉陸幼章分韻得山字生平無他好惟在山水間無錢買山居年年來看山九峯多雅趣一一堪躋攀良時遇良友意適幾忘還飲酒莫辭醉賦詩奚暇刪偷間乃吾樂待足何時間寒暑有往來甲子互循環世上逹人輩營營苦貪慳少壯忽以過局促凋朱顔此語祕勿傳徒取昧者訕明年幸無事再來扣禪關得洛容兄遞中報二十韻有序自春首得茂名書後聲迹邈然無聞侍儀伯祺錢公得衢人語謂移倅贑州雖未敢必信竊以為果能爾則勝在瘴海多矣近於遞中得報始知贑説為誣其實乃調栁之洛容也栁雖不及贑然比之高涼亦有間但斃其所攜僕無親信在左右為可憾也作詩以寓其嗟歎不足之意云向來出門别誰作萬里看及聞茂名去不得送征鞍高堂有白髮遽違菽水歡本心豈急仕君命敢盤桓六月冒炎瘴所憂行路難妻孥每話及我淚常不乾新年附書至到縣幸平安既得消息佳在逺心亦寬侍儀重報喜道聽傳弗端移贑固就近訛言竟空歡遞音始真的果調洛容官骨肉不在眼視僕猶肺肝更失此力助無乃形影單雖云有民社土俗嫌凋殘隃知退食處對案時長歎吟腰帶圍縮短髮那勝冠幾回欲飛往恨身無羽翰雲山隔長望萬疊青巑岏征衣未遑寄又見秋風寒冀能自愛重努力當加餐煮鶴山人偶劈琴寂寞九臯音借問纒腰想何如食肉心青田真易寫赤壁夢難尋恐襲乘軒弊防微意亦深立春前一日見雪殿臘殘年裏攙春一日前意如天弄巧勢似雪爭權表瑞何嫌晚成功不貴先喜來呼熱酒莫上剡溪船移居新卜草堂為愛林塘好移家向瀼西半生烏繞樹一旦燕銜泥花徑偏宜曲茅堂不厭低猶煩車馬客時復問幽栖與胡彥恭同宿釋耕所之西軒同下西窗榻凄涼強説詩暮秋將盡夜風雨正來時屢翦生花燭頻誇殺著棊侍兒先欲寐意似怪眠遲挽楊仲桓學正開卷即潸然斯人不永年春秋郯子國風雨廣文氊遺德令人愛清詩與世傳至今華表鶴夜夜月中旋東野草堂隱迹向東野草堂幽趣多門埀繫船栁池放換經鵝象局間中戲禪牀醉後歌不知名利客擾擾欲如何舟次采石風雨黃昏後帆收采石來人家臨驛住野廟向江開蠟面傾浮蟻燈花落細煤謫仙何處問夜靜水聲哀送翁應吕憲僉之羅浮繡衣分按處父老候官船緑水青山郭紅螺白酒天不憂蠻俗悍政要使君賢公暇堪遊息蘇堤尚宛然思家生别雙埀淚虛名五品官豈能忘頃刻不見寄平安逺道三千里孤舟十八灘何時得歸去細與説艱難花朝徒步花氣藹晴芬遊人暖欲曛白飛天際鳥紅起海東雲酒斾遙相指漁歌斷更聞野塘春水黑科斗自成文過澱湖舟前白鶴孤相引過平湖時景鶯花月煙村水墨圖朦朧山似有浩蕩地如無天與東風便帆開十幅蒲寄明古鏡上人山中多雅趣只有翠微庵緑樹半過屋白雲長滿龕詩留逋客和禪對隱君談擬約胡高士來尋玉版參畣陸宅之世情方矯揉吾道欠亨嘉志似籠中鶴身如井底蛙幾人蛇畫足每事槿開花留得春衣在都將付酒家挽全希言學士今代瀛洲客先朝太學生桓榮稽古力疏廣乞骸情丹旐書官爵黃麻載姓名無人堪繼述墓碣待誰銘艤舟干山下時久雨新霽泥淖不及登山此雨敗人興到山無分登若非猿鶴怪定是鬼神憎泥汚階千級雲埋塔半層振衣凌絶頂空想舊遊曾送高德初左遷瓊州學諭領職瓊臺去心猶戀紫宸不辭官獨冷但願物皆春卉服方沾化儒冠信誤身雕題本非類何意與相親送李孟起貢士老朽歸田日賢良出仕時未斟辭别酒先寫送行詩紅樹江邊驛黃花宅畔籬客程秋正好去舸莫嫌遲浦南待月出浦無多路停舟且莫行不愁潮正逆少待月微明隔岸罾依火沿汀鴈報更掩篷雖假寐時復夢魂驚除夕立春今嵗將除夜明年預立春未能榮及物但覺老催人漏滴時交子星移月建寅屠蘇來次第末後亦沾唇送吳友仁此行何處去云是向京華别意猶堪畫離杯不忍拿水通三泖接雲起九峯遮聖代恩波闊歸期定有涯中秋感懷二首今夜中秋月清光滿太空乾坤同覆載故舊各西東餘事皆身外浮生亦夢中惟憑一杯酒酬此桂花風昔聞天柱樂今慨庾樓空玉字青冥上銀橋碧漢東舞庭鸞繞側搗藥兔居中桂子飄香處憑闌立下風鳳臺懷古鳳去名猶在龍蟠勢莫過好春三月最遺恨六朝多寂寞金蓮步凄涼玉樹歌對花須痛飲感慨欲如何陪陸友章登佘山值雨行樂非無分依違必有因江山能愛客風雨故留人篷底茶煙濕樽前竹葉醇米家船似屋到處白鷗馴壽陸宅之先生海屋添籌日天河役鵲時偷桃嗔曼倩授棗謝安期醉裏生涯好間中嵗月遲若邀湯餅客須遣廣成知次韻俞仲基對雨二首田家信五行甲子只祈晴柱礎俄先潤天瓢忽屢傾水聲寒汨汨雲氣白英英縮手防揫斂農人奈此情竟日無聊賴愁來睡轉濃故人離别後往事夢魂中兒懶如工部妻賢異敬通業耕天未許淫雨故妨農寒食夙興聞有祭墦而野哭者因懷梅雪父子澄心祖孫并耕讀汝舟孟熙諸遷客况民有飢色屋多逃亡感存念歿悲不勝情村落蕭條甚猶如喪亂民誰家能樂業何處可容身野哭添新鬼風流減舊人今年寒食淚不覺易沾巾次韻陸宅之雪中見示瑞象新年有纎埃到處無山開銀洞府地湧玉浮屠筆凍詩難寫樽空酒更沽重茵莫嫌冷跣足有樵夫上灘灘聲何洶湧未到已先聞亂石狼牙出支流燕尾分天寒虹復見山晚日初曛倦客無機事沙鷗自一群下灘一灘盤幾曲兩界會三義磊磊水中石斑斑巖上花牛歸知熟路犬吠是誰家舟子相催促天寒日易斜南村雜興次韻陶九成十首間居心不競無辱也無榮澗水流來曲松風響得清東林因社入南畝待時耕敕斷相關事尋思效子平郊墟鳴吠接鄰曲往來通好古襟期逺登高眼界空鹿肥茸嫩碧鶴長頂深紅何以扶衰老君臣藥有功白雲和地掃明月就窗賒囊蓄三年艾庭栽四季花旋炊魚信美新釀酒偏嘉穩代青鞋步肩輿勝鹿車祈晨投里社學圃問園丁高閣屠龍技重刋相鶴經浩歌驚木客幽討泣山靈長為催詩債人來夜扣扃霧斂山羅列雲來樹隱藏芝田平似案花宅小如航侍立皆清秀交遊盡老蒼間身百無事天賜醉為鄉盡稱家法好生計孰云疏婦肯隨夫唱兒能讀父書為花春載酒因月夜巾車惟恐聲名出難容只隱居愛居山水窟因此託歸耕不仕名逾重非臞貌自清神交來太乙夢讖應長庚有酒能留客毋勞問治生一曲清泠水深如濯錦江囀枝花底鳥吠竇月中厖魚罧通西泖茶煙起北窗許多幽隱趣不讓鹿門龐五栁如今宅雲間第一林竹肥鞭筍出松老茯苓深鵝放臨池浴鶯聽出谷吟朝冠非懶戴髮自不勝簪南村風景異勝似輞川多山露前峯塔江明落照波詩僧留偈别學究抱琴過石上殘棊局旁觀已爛柯九月三日奉天門早朝得賜寶鏹香藹天門衛仗間例隨鵷鷺入朝班侍儀引進名初奏給事傳宣賞就頒宫扇受風開雉尾衮衣耀日動龍顔腐儒何幸遭明聖得預觀光禁闕間九月十四日上親䇿試賜膳華蓋殿西廡下以大行皇后喪設酒不葷大明開運主文昌多士爭能翰墨場有分只嘗光祿酒無緣得享大官羊殿庭重典歸儀禮樂府新聲出教坊喜動天顔蒙顧問朝衣熏染御爐香十月十五日奉天殿早朝蓬萊日映柘袍黃宫扇低回翊御牀樂譜總傳天上曲爐煙不是世間香九重德意通蠻貊一統根基軼漢唐晚進小臣親得覩愧無才力賦長楊十月十有六日早發龍江驛晚泊新河上流望采石山船出龍灣去路賖故鄊回首眇天涯一雙柔櫓西風逆三面空檣落日斜雲起淮山將作雨潮登江岸欲吞沙明朝采石經行處閃閃寒空見落鴉春暉堂宴集美景良辰不易逢高堂歡宴且從容畫闌芍藥籠燈照銀碗櫻桃和酪供公子清談霏唾玉佳人低唱斂眉峯主賓樂有如澠酒起坐喧譁意正濃帳房坐眺次韻張思亷壯士如貔力拔山將軍勇氣蓋人寰旌旗影裏蚩尤動􅎏鼓聲中覘騎還印佩黃金龜作鈕劒磨白雪獸銜鐶不妨談笑青油幕預遣精兵夜守關送石達卿赴淮南之辟當代搜羅急俊英豈容徒老鹿門耕淮南幕府多招隱水北山人最得名參术正須歸狄籠鹽梅甫用入商羹只應湖上秋風起猶為鱸魚惜此行宅之約余中秋過小海樓不克往萬里長風掃積陰碧天如洗籟沉沉今宵何處無明月比屋誰家有賞心詩句驚人從和寡酒杯到手莫辭深南樓已負憑闌約老子胡牀興不禁漁隱為賴善卿釣船隨處可為生二十餘年不到城剩水殘山原自在清風明月有誰爭元真解后留詩别甫里尋常載酒迎南往北來無定迹恐人情熟漸知名海屋為彞古鼎海上高僧屋數椽珊瑚碧樹繞階前過橋雲磬天台寺對岸風帆日本船龍女獻珠來供佛鮫人分席與參禪百千劫數如彈指眼見桑田幾變遷由小孤山過彭澤縣訪晉處士故居碧天新霽片雲無一望澄江似練鋪魚向小孤山下買酒從彭澤縣前沽征帆催卸風微轉飛鳥知還日欲晡五栁人家今在否憑誰為我問樵夫覽鏡自嘲官樣烏紗換角巾已非巢許輩中人枉煩徴幣加殊禮敢謂儒冠誤此身舊隱定招林鶴怨前呵應被野鷗嗔寄書楊璞能詩婦添得愁眉日幾顰會慶堂尹山高聳碧崔嵬會慶堂中百福來五色靈芝皆瑞象千年仙鶴豈凡胎客前嬉戲憐蕭願兵後間關見老萊留與子孫誇盛事品題多出翰林才雪後宿城南精舍因尋竹院到江村釋子初歸客在門殘雪又顛風作黨寒潮已落岸留痕研池滴水冰隨結爐燼飄香火自溫借榻西窗學趺坐一燈寂寂照黃昏舊時月色為吕希陽訓導月到衡門有意無相隨出塞又歸吳適來此夕又何夕照見今吾即故吾屈指秋光重自省滿身花影再誰扶陰晴圓缺尋常事消得平生酒幾壺悼洛客兄射䇿期空冀北羣却於百粵弔劉蕡山連高竇天如蓋地接融藤瘴似雲賈誼過秦空有論相如喻蜀豈無文深埋萬里收歸骨淚灑東岡四尺墳次韻俞原舉致謝高都官惠錦熏籠窮巷東風氣力微尚能噓拂到柴扉燕衝細雨烏衣濕花落間庭雪點稀恨别江淹雖好賦乞骸疏廣未遄歸多情割贈熏籠錦鈿合分香出繡幃次韻姚比玉雪中之作風雪雖嚴莫掩關天開圖畫一時間閭閻均作白銀闕培塿盡為羣玉山上將功成淮蔡下故人興盡剡溪還屯邊百萬皆驍勇佇聽王師奏捷班紀夢麻姑相約看扶桑海水如今可斗量誰放金雞天上呌自騎丹鳳日邊翔三花樹底逢蕭史五色雲中拜玉皇下視寰區類蓬顆三山眇似一毫芒白雲歸岫送道士吳德常還洞霄宫本是無心出翠微英英還傍故山歸五交洞口從龍入九鎖峯頭伴鶴飛只許丹霞分窟宅或隨明月到巖扉世人何處尋蹤迹惟有松風振白衣草堂偶書屈曲緣江出路賖青山多被四鄰遮豈無修竹來鳴鳳儘有埀楊宿暮鴉俗祀勾龍招近局僧逢穀雨寄新茶往來盡是山王輩不比尋常野老家留别華亭尹蔣季和二首别時栁花沾客衣相逢又驚黃葉飛惠州飯中子瞻喫柴桑菊待淵明歸真金百煉色不改大雅再調聲更希攀轅有人且少駐九峯酒釅松鱸肥否泰窮通各有時東西南北正多岐四愁適類張平子三黜何慙魯士師細酌瓦盆初潑酒重論石鼎舊聮詩如今且莫匆匆别後會明年未可期味蓴軒爾家江東老步兵秋風歸興託蓴羮生前惟務一杯酒身後不圖千載名華亭鶴唳已成恨松江鱸魚方可烹至今世有賢孫子亦比他人見獨明尹節婦二十婦道無欠虧兒未三月身孤嫠共薑有誓天與圮令女此心山不移能扶綱常勵風俗可使旌表光門楣後來史筆重節義佳傳必資徵是詩賀張季自臨濠還鄉十年淮甸歎離居喜得歸來有敝廬衣裂去時慈母線囊留别後故人書四鄰訪舊多為鬼三徑開荒半是墟且把釣竿重整理江南還有四腮魚寄成安尹彭子潤江湖渺渺白漚寒只有黃花獨耐看老去龎公惟欲隱歸來陶令已辭官詩名肯落他人後酒量何如昔日寬自是山陰無好興扁舟來往不為難次韻姚比玉贈薛相士秋蟾秋蟾躍出明月腹光熖照人雙眼開何事不歸天上去有時還傍海邊來靈探理窟鬼神泣影落寒潭魚鱉猜且待烹茶澆汝口爐中笑指折鐺煨東村隱居為長州趙伯善都説長州多絶景東村只數隱君家開窗正與青山對繞屋偏宜緑樹遮梯傍西巖收笋蕨船來南泖買魚蝦日長門外無人過時仗清風掃落花蘇臺夜泊扁舟暮抵闔閭城愁聽傍人話戰爭龍井水光相蕩潏虎丘山色自陰晴野花原是吳宫草甲馬曽來越國兵西子不歸臺亦廢空留江月照人明遊虎丘山參差樓閣半山開迤邐登高入寺來寶藏虎歸風撼樹劒池龍去水生苔塵封坡老題詩壁雲鎖生公説法臺但過不須窮古迹上方猿鶴易驚猜九江道中二首吳頭之西楚尾東路分川廣此俱通水來彭蠡滔滔白樹對潯陽的的紅司馬淚多衫易濕翰林才逸句何雄風帆且莫匆匆過瀑布香爐在望中湖口路分如曲叉山連吳楚水無涯行舟破浪十雙櫓野店傍橋三四家負炭急呼招渡客懸罾逆上洑流槎南方地暖春偏早開遍寒梅一樹花惶恐灘夜泊天下只聞巫峽險誰知此處更堪愁舟穿亂石堆中過帆向荒山腳下收閃閃磷燈隨魍魎啾啾蓬顆聚鵂鶹灘名惶恐非虛得一夜令人白盡頭巎口人家簇簇人家竹崦西懸崖置屋競高低石梁橫布巖前路澗水斜通峽外溪隱隱白雲藏吠犬茸茸碧草卧馴麑舟中過客方多險得借晴窗一榻栖贑州道中親到金門奉紫泥一麾遙領大江西路從惶恐灘頭過詩向鬱孤臺上題風撼紫藤鼯鼠立雨深斑竹鷓鴣啼九峯回首家何在杳杳青天覆地低豫與翁應吕同至贑州府是日各從本道豫往雩都翁赴惠州作詩送之時十一月十有七日也客鄉送客不勝愁君尚驅馳我暫休好趁梅花登庾嶺直騎官馬到羅浮盤遊骨董還中喫橄欖檳榔莫外求荒服近聞炎瘴息公餘飽飯亦何憂雩峽道中客况無聊只自悲凄涼怕近夕陽時收簾野店關門早荷擔樵夫下嶺遲雩峽水渾沙鳥浴蘆花煙起釣船炊驅馳已覺勞形甚愁説前灘路更危世情世情擾擾亦奚為百年幾枰翻覆棋東鄰舊業已易主西家新第才尋基也知石有能言日莫信馬無生角時青天在上管何事造物戲人當咎誰畣張夢辰見寄林泉張徵君自以其年六十靡有寧止嗟歎不足形諸詠歌以示知已蓋深有望于仲齋梅雪諸君子且有屬豫從臾之語豫因撫卷唶曰昔戴逵在剡郗嘉賓為之起宅杜甫在成都裴劒南為卜浣花溪作草堂居焉又如周公瑾推道南宅以舍孫䇿于允元以百萬資戴符買山古人之待友也其勤厚類如此豈今之人不復逮古耶雖然至使林泉有是作者亦諸君之恥也豫非敢重於責人冀諸君子將激余意必不讓嘉賓輩專美往昔則吾林泉之謀何患其無成乎讀書有莊可待也姑次韻奉畣不免添注腳如此云比似杜陵心更忙無錢自買百花莊氣消塵匣斗牛劒夢短客簷風雨牀湖海知名交豈少林泉得所趣偏長明年果遂歸田計釣月耕雲樂未央雪中寄朱梅雪紛紛三日不肯積頃刻聚來平路岐寒窗夜誤雞報曙凍樹晝集烏號飢南鄰酒伴可走覓東家蹇驢難借騎不如閉門自引滿此際豈是千人時開司日偶書幣聘真慚德不任新除均荷聖恩深雖無汲黯開倉力惟有思謙報國心每事謹持三尺法何人敢餌四知金平生自信如弦直激濁揚清正在今開司十日無一人來訟者庭可羅雀書以自誚十日官衙無訟聽南山相對坐如癡却嫌事類不鳴鴈寧免人譏沒字碑未許公孫能吏事且容何遜得吟詩晚來偶縱墻東步賴有梅花慰所思立春日有感今日逢春謾自傷客懷孤負好風光少年無復有吾分到處不如歸故鄉草色上階隨意緑鶯兒出谷轉身黃官厨硬餅殊難捲空愛辛盤菜縷長壬戌嵗除坐聽街頭爆竹頻故鄉風俗異鄉人一年今夜情偏惡萬事明朝迹已陳竈巷掃除循祀典州司奔走送門神莫嫌夜雨添蕭瑟也為炎荒洗瘴塵次韻賴善卿禁體雪詩撲瓦篩林響亂兼奔風作黨暮寒添見輕舞手承窗隙驚密回頭仰屋簷剡曲夜歸人迹斷藍關凍合馬蹄淹平生口腹無貪得此水烹茶獨不廉錢節婦此身本是未亡人恐辱亡人敢辱身擬與共薑同死誓願從孟氏接芳鄰連城白璧元無玷出壑清冰不受塵及見寧馨頭角露分明天錫兩麒麟壺月軒為李守道素壁穹窿類雪窩窗虛簾薄受明多風開雲母忽甕破塵隔水晶初鏡磨只道洞天無晝夜安知大地有山河此中皎潔長如許四面皆墻奈爾何懷靜軒并序懷靜軒者居延馬季子之所築于淞之吳會里者也季子之先出自雍古部族居靜州天山五世祖實喇濟蘇仕金死節諡忠愍血食汴之褒忠廟四世祖烏呼納遭元憲皇以白衣官斷事厯事世皇拜禮部尚書諡忠懿曽祖世昌尚書省郎中祖禮宣政都事季子隨都事公居于淞淞去靜計萬餘里而以懷靜名其軒不忘本始也家世天山烜德輝兩朝閥閲古今稀褒忠節義埀青史禮部勳名起白衣雪灑穹廬駝正乳月明華表鶴應歸相望萬里風塵隔空羡年年鴈北飛先君處士哀詩有引先君臨易簀之日是旦夢至一所宫闕嵳峩冠佩雲集適有二人出而迎者因問是何處曰此閶闔門也遂恍惚而寤悉呼家人至牀下厯厯道其故及晡乃屬纊嵗月云邁三載于兹追念如存哀感無已呼兒牀下語丁寧猶記當時厯厯聽天上已回閶闔夢人間不見少微星家藏手澤遺書在地發神光瘞劒靈述作為無韓栁輩三年未勒墓中銘癸亥嵗旦賀正禮畢雨窗獨坐有懷草堂官屬臨門曙鼓鳴起來望闕賀新正禮當序爵居班首老邁增年動旅情天上已頒新鳳厯雲間却負舊鷗盟草堂今雨交情見問訊何人獨意誠會昌道中梭頭船子靸鞋輕逆水上灘三日程岸回時見虎狼迹村逺不聞雞犬聲人事往來何日定世途登頓幾時平老懷莫為投荒怯喜有青山繞縣城重登小孤山小孤祠廟向江開使節經由兩度來路出山腰盤曲磴亭栖樹杪見粧臺銀河水逆龍舟歇碧落風生鶴馭回我亦飄飄欲輕舉此身何異到蓬萊番湖舟中不才自分老林泉今日驅馳孰使然行李往來惟一介勞生半百欠三年康廬雲霧昏迷日左蠡風波逺際天夜泊最嫌楓樹近繞船漁火照愁眠胡鼎文草堂别駕山居草作堂勝如工部百花莊鶴雛轉頂丹砂渥松木凝脂琥珀香月下敲門僧問字雪中掃徑客攜漿林泉足可容真隱只恐聲名自播揚除夕兩在他鄉見嵗除今年守嵗在吾廬小兒歡喜頻行酒猶子平安逺寄書陶令無心希厚祿安仁有志賦間居勞生半百雖虛度三徑猶存不負豫竹所為太常典簿顧謹中路繞闌干屈曲行緑陰遮暗石棋枰酒杯瀲灧花前興茶臼丁東月下聲拄杖敲門無俗輩題詩逼檻有僧名籃輿徑造知何日直待明年燕筍生耕讀莊為俞原魯鸐鵛灣頭一草堂繞墻桃李繞隄桑寬如五栁陶家宅僻似百花工部莊雨洗春犁間倚壁風吹故紙亂堆牀龎公雖道為農好也欲教兒識數行雙桂堂為俞伯剛堂前雙桂如玉樹衆木搖落正芬芳淮南偃蹇有何異月裏娑婆無此香連理合時兄弟好帶花移後子孫長嵗收金粟三千斛天富燕山竇義方次韻畣俞仲基二首人生契合無新舊市道論交有淺深莫效卞和三獻玉當辭王密四知金亷頗不負相如意鮑叔真知管仲心獨為武侯長抱恨空遺梁父舊時吟鶯花時節近清明如此風光眼為驚但有酒錢須盡醉本無丹藥可長生兔葵不管興亡恨燕子徒知往復情萬事只今春夢裏杞人何必慮天傾西郊晚晴老眼分明夕照前依依墟里見人煙東家筍作西家竹南岸人耕北岸田野店杏花沽酒市石橋楊栁賣魚船太平已似開元日雨順風調喜有年送費彥莊還西蜀滿載圖書問去程更休回首歎飄零雪消巴水通巫峽月照湘帆過洞庭鳥道不消三月到猿聲莫向五更聽異鄉久住忘羈旅好看巖山雨後青晚過泖東摩挲醉眼倚吟篷百里纎毫在望中佛塔穹窿雲表杪人家星散泖西東沾衣不濕疏疏雨吹面輕寒剪剪風船後青山如腳走白鷗飛盡水連空贈張孟經長沙太守子孫賢湖海知名四十年虎卧杏林監受穀龍窺丹鼎候燒鉛胸中議論驅羣惑肘後方書得袐傳我有一生詩酒癖如何到老不能痊有感晨雞唱罷暮鐘鳴擾擾匆匆役世情白石安知無日爛黃河還見有時清浮生得失樗蒱局往事悲歡傀儡棚讓畔終身何損益從來此地幾人耕耕樂圖為璜溪楊正茂樹蔭柴門犬不驚小窗機杼隔林鳴桔槔未濕逢春雨襏襫初乾憩晚晴三泖鮮魚如菜食九峯新酒對花傾自緣無事千州府莫笑龎公懶入城次韻畣俞原舉五首滿頭華髮怕逢春山鬼揶揄正笑人祖道不沾雩峽水征袍空染貫城塵已無勳業銘彞鼎豈有聲名動搢紳但得五湖風月在釣船還與白鷗親三載崎嶇蜀道行虛名已覺負平生季鷹從此有歸興思曠自來無宦情恐作漁樵間話説敢忘車笠舊交盟鶴灘喜與鴛湖近夜夜相望共月明秀州東郭殘年裏曽得春風送客舟别去幾何情契闊詩來如此意綢繆光陰日薄皆虛度故舊星稀半不留江上酒船重有約殘山剩水尚堪遊自蒙人日題詩後夜夜光輝照草堂玉石琢磨方是器芝蘭熏染不聞香虛名只作尋常事豪氣何分上下牀但恐九霄孤鶚起老夫拭目仰難望對月有懷多好句勝如春草夢西堂豫人然諾千金重到手緘書一尺長鶴弔機雲迷故宅燕尋王謝失雕梁都緣十載興亡恨詩後殷勤併寄將春分日見雪臘前為瑞竟無多却向春深瀆至和病後不禁寒料峭老來偏惡氣乖訛山陰笑端作故事江上畫意在漁簔東君摸稜有如此鶯花寥落奈爾何次韻畣張林泉白髮無情已不饒固宜甘分老衡茅德公退隱非要譽元亮歸來便息交花下酒壺還獨酌竹間茶臼問誰敲自知性似邊韶懶寄語時賢莫見嘲重陽有感衡門稚子笑牽衣新酒初香豆莢肥佳節重陽還復至故人何處不曾歸黃花有約開偏早白髮無情落漸稀未必晚年陶處士覺今俱是昨俱非次韻東村舟中夜雨醉夢初回四鼓前打篷急雨亂如拳半牀雲錦沾俱濕一點風燈照不眠陶令意輕彭澤縣龎公志在鹿門田明朝行樂誰能必未定陰晴亦偶然中秋玩月次韻胡鼎文别駕碧天飛上爛銀盤此夜清光到處看雲絮逐風還片片露珠埀葉正漙漙尊前香噴黃金鴨空外笙來白玉鸞欲詣姮娥一問訊只疑高處不勝寒蘆花舟為李孟起蘆花深處屋如舟倣佛漁家鸚鵡洲沙暖可容鷗寄宿月明還有鶴來投掀篷浪影翻晴雪繞壁風聲聒暮秋茶竈筆牀都放得醉堪伸腳更何求與俞原肅并序九載一相逢百年能幾何此杜少陵别唐十五詩也余與原肅公别二十年甫得一見則百年之內如此者復能幾何况公去國懷鄉久矣今乃尋丘隴於荆棘視第宅之丘墟撫今念昔悲不勝情故舊之存者不過數人相對歔欷恍如夢寐雖飲酒不樂也豫謂廢興存亡人事之常感慨何益作詩解之相别相逢二十年弔生問死各凄然交遊零落無多在鄉里蕭條不及前荒隴夜聞翁仲泣廢臺今見牧兒眠何須對此空惆悵見在深杯且共傳琴清軒為豫章胡若思軒靜琴清風撼櫺香煙初直酒初醒丁寧鶴語來華表髣佛龍吟隔洞庭織女停梭天上泣湘靈掩瑟月中聽改弦别作梅花㺯碧落雲消白露零謝李孟起同知惠扇南浦朝雲月樣裁歘然飛墜五茸來冰絲細薄難為骨蟬翼輕盈易脫胎重價倍增凡俗妬仁風一播鬱蒸開欲酬逺意將何物草草題詩愧不才夢述聖德詩祖述唐虞道統長斯文未喪畏何匡孺悲欲見嘗辭疾陽貨先施亦瞰亡夷俟不容原壤踞楚歌無奈接輿狂春秋書法多深意埀訓將來示百王次韻林泉病起算老侵尋七十春又梳白髮裹烏巾入編詩藁刋初定經驗醫方纂必親汗漫江湖雙敝屣逍遙天地一間身平生熟究春秋學絶筆如何止獲麟滄江送别為吳友仁行李無多酒一壺滿船和恨載妻孥忍將今日留連意盡作滄江送别圖筆陳易空三窟兔釣頭難得四腮鱸生涯定分當何處早寄平安慰老夫林泉民為張夢辰二首背山臨水郭東村竹裏茅茨栁下門種樹得書添自注煎茶知法許僧論襄陽何代無耆舊橫浦斯文有子孫冠蓋故家多覆墜獨因為庶至今存身披鶴氅手扶藜布襪青鞋白接㒿魏野隱居堪入畫龜蒙到處可題詩花前問月停杯夜栁下乘風罷釣時屈指故人凋謝盡山妻莫笑鬢如絲望淮軒為錢文規望淮軒上客來頻多有江南故舊人雲起八公簾半捲風傳百和酒初巡吳艘順下帆如葉海鶴橫飛翅若輪日日倚闌圖畫裏不知身是異鄉民題楊竹西不礙雲山樓斯樓不與雲山礙十二闌干在半天雲自往來飛鳥上山尤隔越去帆前歌兒莫放高聲起畫史惟將逺意傳日日登臨留客醉四時風月浩無邊書亭林寺壁事在梁陳史可稽讀書堆上草萋萋多年不作青衣夢幾夜空聞白馬嘶水底斷碑猶有記壁間醉墨可無題老僧又送遊人别日落西林鴉亂啼閨思淡掃蛾眉羞自照巧梳蟬鬢向誰誇酒因不飲愁難遣事為無憑恨轉加褥錦坐當交頸鳥扇羅繡及並頭花欲題詩句無紅葉寫遍窗間舊碧紗正心齋為許仁民長鬚曾識許神農復見賢孫繼祖風方寸有餘陰德地平生多少活人功源流不出三因外天理常存一念中好侍板輿承母意滿林春色杏花紅來鷗亭為姚宗文泛渚眠沙各自如忘機相對稱幽居意如親筆惠崇畫迹似古文蒼頡書春雨蘭苕迎翡翠夕陽葭菼伴舂鋤闌干角畔題詩處眼界無多景有餘秋興四首景物凄涼萬感叢怕逢搖落見秋風雞鳴函谷行人度騅到烏江霸業終嵗月往來寒暑盡乾坤覆載古今同誰能斷得無情水莫放東流更向東海上蓬萊識未真樓船一去竟迷津仙家自有長生藥塵世元無不死人西苑年年花落盡北邙日日冢添新春衫可典何須靳莫負淵明漉酒巾休聽尊前懊惱歌聽時愁緒越添多平生事業今如此後此光陰更幾何三過玄都惟夢得重遊赤壁是東坡老懷容易悲陳迹不信觀棊有爛柯仰望青天漠漠高人生處世一鴻毛胡笳有拍空遺恨漢節無旄不易操方朔寓言興設難屈原忠憤在離騷讀書多費間傷感且向西家喚濁醪金陵懷古六朝事迹今何在禾黍離離滿地愁商女隔江猶唱曲逺人懷土莫登樓潮隨鴈落回京口山作龍蟠護石頭記近酒家曾夜泊秦淮寒月照孤舟壬申除夕弔影燈前淚滿腮聽兒憶母哭聲哀宜春帖子何心寫守嵗家筵不忍開老景此時無可奈新年明日又還來梅花笑我頭斑白消得屠蘇更幾回癸酉嵗旦獻嵗先來問有誰卧聽風雨起偏遲去年舉案人猶在今日沾衣我獨悲禹錫魂消傷往賦安仁情見悼亡詩半生落魄如間過頭白艱難值此時次韻林泉留宿聽鐘有感客簷卧聽禁城鐘蠻帳低埀舊紫茸窗眼月斜天未曉瓦溝霜白景初冬千年華表無歸鶴十月寒潭有蟄龍擁被自捫丁固腹老來無復夢生松耕隱為黃彥正三首今清夫令祖誅茅結屋向東災為圃為農亦有師每引漁樵聽客話須將稼穡教兒知秋風稻熟雞先啄春雨芝香鶴不飢龎老從歸鹿門後諸人罕見入城時知時布穀隔林呼雨後春犁學自扶豈可枉尋干祿仕何妨識字作農夫畬田火米常先熟老甕新篘不用沽竊比古人誰得似長沮桀溺是吾徒背城茅屋水雲深絶迹無人向此尋壤父不知堯帝力君房安識子陵心扶犁曉趁黃梅雨嗿饁涼依緑樹陰但使年年多黍稌何憂白髮老相侵次韻陳敬德主簿題明心寺壁秋風過客幾華顛只記曽留短簿船清話可延僧有供吾生未到我無緣窗間貝葉猿偷看石上松花鶴襯眠王播他年訪遺迹碧紗應護舊題篇俞東村示教雨窗感興佳作連篇纍牘寓意深逺譬如雍門之琴能使聽者墮淚諷詠之餘勉強追和不翅鳴瓦釡而配黃鐘也白髮無情不我饒東風楊栁自新條蓬萊弱水舟難到閶闔青雲路本遙晚景生涯何轉拙早年豪氣已俱消閉門只是聽春雨連及鶯花也寂寥老懷多感不能禁當得春來日日陰酒為破除聊縱飲詩因牽帥強搜尋屋茅直透三重濕溪水平添數尺深白髮懶梳巾懶戴尋花問栁更何心造物難知一聽天貧居無事只安然能如東老依方釀勝似中􅍽汲水煎燕去燕來何必管花開花落不須憐百年身世渾忘却懶散從教雪滿顛次韻答張拱辰判簿兼柬陸宗善馬家兄弟白睂良濟濟諸郎更肯堂承露金莖為器重臨風玉樹過人長春秋舊學傳三世月旦新評冠一鄉况有詩鄰今魯望並如鳴鳳出朝陽題葉子澄草堂卷背郭煙村四五家吾廬幽僻更無加遡風紫燕時穿幕避雨黃蜂早退衙笋過鄰家還作竹豆沿籬落自開花安仁已著間居賦韋曲樊川未足誇次韻畣胡彥恭二首咄咄書空坐夜闌燭盤花落酒杯寒不愁妾命秋雲薄只恐人心蜀道難阮籍當年猶慟哭王陽今日正長歎頭顱如許身何託掩鏡羞將白髮看移家五見嵗華闌海上鷗盟漸覺寒扼肉虎吭求食易刮毛龜背作氊難樽猶有物吾何憾甑未生塵婦莫歎半百光陰駒過隙試將日晷靜中看次韻畣俞季明萬里題詩寄草堂此情珍重可能忘鴈歸塞北書難託人到雲南戍正忙臨老光陰催我輩封侯事業在戎行流離尚出清新語不改平生錦繡腸送蘇溫赴高州天寒野曠呌鴟梟愁説高州去路遙章貢北來山抵浙番禺南下水通韶風搖橄欖枝頭落雨打桄榔樹葉凋他日歸來再相見九峯買酒話今宵自述并柬王允夫少尹自脫江州舊淚衫年登半百又逾三星移斗柄還將北鴈到衡陽更不南花暖蜜蜂衙未散樹陰穴蟻戰方酣釣船且避風波險長恐蛟龍怒出潭寄顧典簿謹中暮雲離思隔江東渭北春天樹似篷大藥那能消鬢雪好詩還可愈頭風星移物換人何在古往今來事不同又是誰家樓上笛夜深吹向月明中次韻俞仲基送原肅白頭相遇酒盈巵弟勸兄酬兩莫辭難得鴈行無恙日稀逢馬角有生時且聽今夕燈前話何待明朝别後思本是一般珠玉樹花開南北不同枝昌德言小海樓上即席次韻畣陸宅之先生并示晏如上人五首八月溪盤饌四腮如何不飲掌中杯人生莫為虛名誤塵世難逢笑口開滄海飢蛟無日飽岐山鳴鳳幾時來清風拔俗高千古只有桐江舊釣臺莫笑蒼顔皺入腮相逢有酒且銜杯縱身狂活凌霄附過眼繁華日及開白玉韞藏非不售黃金散盡却還來十年多少興亡恨又見姑蘇鹿上臺買魚江上栁穿腮過酒墻頭菊泛杯鏡裏莫羞雙鬢改尊前須放兩睂開鹿門龎老辭徵聘彭澤淵明賦去來萬事失真均是妄猶如蜃氣結樓臺清茶啜罷味留腮勝酌金莖露一杯茅屋秋高重待覆柴門日晏始教開青山與世無新故白鳥親人自往來不忍見渠歌舞地樵夫牧竪日登臺䰐鬖兩鬢雪埀腮消得長生藥半杯枸杞或聞巖下吠蓮花曾見火中開函關望氣青牛度天竺馱經白馬來道眼同歸無物地也知明鏡本非臺間處光陰軒為章文浩二首窈窕軒窗面北開百花都是舊時栽青天有影池中見白日無光樹底來酒令逡巡香未過棋聲剝啄夢初回闌干朝暮惟多景不著凡間一點埃宜捲湘簾且莫埀要看清景半涵池雲過影落萍開處風起聲來竹動時對客不辭分險韻留僧必欲了殘碁日長猶恨無消遣髣佛仙家嵗月遲城南早行朝出城南宰相街金陵城南地也雞鳴何處尚喈喈龍鍾步武人爭笑懶坦心情衆寡諧暮景惟添新白髮好山空負舊青鞋即填溝壑吾何憶多少英雄骨未埋奉簡陸宅之先生并晏如上人二首人生交結貴相知白首何嫌契合遲惠逺肯沽陶令酒杜陵能賦已公詩山中湯餅無虛日溪上鱸魚正及時更為少留差可意杖藜來往得追隨司馬才名走卒知樵夫下拜獨何遲暮年樂易惟談道終日間忙只課詩尚父海濱歸有在管寧遼左去多時如何得似昌黎語變化雲龍上下隨懷高都官鳳鳥不鳴吾道微擬逃名姓老岩扉襄陽耆舊無多在洛下衣冠已漸稀久望東山安石起未聞遼海管寧歸馬融何必為南郡只合髙堂坐絳幃可自怡軒終日開軒得自怡白雲堪玩不堪持近疑有路梯天處間愛無心出岫時風引度墻陰覆屋雨來沾席意催詩紅塵車馬方馳逐我亦渾忘拄頰疲詔賜民租喜而有作因次韻林泉綸音果自九重天率土如逢擊壤年國用既饒宜有賚民生從此樂無邊元豐歌詠非常比貞觀升平豈偶然何幸嵗收多十斛已拚盡付酒家錢遊天池目隨飛鳥手緣藤高出浮圖第一層漫滅欲無碑後字長明猶有佛前燈雲歸石室龕俱滿澗落天池水不增我是乍來方外客倒衣相接愧諸僧何必恃才何必傲當時諜諜空言用莫施磁石引針偏勝玉干將補履不如錐商君變法終危已趙括談兵竟覆師獨有華山濃睡漢未來興廢亦先知次韻張景辰别駕過俞建寧故居有感平泉漫説李家莊緑野猶傳裴相堂草色暗隨春色換人情還逐世情忙空吟暮雨珠簾捲不見春風皂蓋揚過客重經倍惆悵隱然鄰笛感山陽水竹清深為吕德機舍北舍南皆活水萬竿修竹四圍栽青天送月饒先得蒼雪沾泥掃不開魚戲早涼隨影逝鶴鳴何處應聲來小窗風定茶煙歇可著纎塵滓緑苔次韻景辰出東郊之作今日暴寒天始晴買舟乘興出東城逢場作戲何妨事對酒當歌且盡情喬木故家誰得在殘山剩水獨經行季鷹自有鱸魚分不負閩鄉好政聲自述借俞原舉韻書屋半間寬不多小於安樂邵家窩寫經有客籠鵝去問字無人載酒過自喜身間如野鶴誰能心苦似么荷短吟長詠忘朝夕何異堯時擊壤歌次韻胡彥恭送原舉回嘉禾未曽席暖陳蕃榻又復拏舟問去程今夜待潮華谷口明朝看月秀州城得憐稚子牽衣袂占喜家人驗鵲聲試問新年有新作憑誰寄我慰離情天妃宫次韻王元吉何年敕賜天妃號宫闕岧嶤入紫冥龍女來朝多顯異鮫人作市暗聞腥黃姑渚闊天通海丹鳳樓高晝隕星近得瑶池王母約蓬萊有路到珠庭緣陰門巷為何公平薰風時候百花零緑樹陰中舊戶庭幾度胡牀移不倦數聲茶臼睡初醒右軍醉寫籠鵝帖道士親傳相鶴經莫向西家頻喚酒墻頭最惜薜蘿青次韻畣沙允恭兼致尋訪不遇之意白石清泉映緑蕪竹居瀟灑一塵無客來誰與開籠鶴人好吾方愛屋烏隱迹未曽離畎畞詩名早已遍江湖將門書種當奇遇志在行揚慕獨孤晚到豫章聞臨江分司船已先過乃胡彥恭也豫章城下水連空豫章城頭落日紅彭蠡漁歌來隱隱臨江使鷁去匆匆珠簾不見滕王閣鐵柱猶存許令宫南浦西山只如此古今懷抱幾人同述懷寄張拱辰判簿二首行藏不必問如何半百光陰撚指過心在五湖忘世久眼空四海閲人多把來長劒猶能舞改罷新詩復自哦恨入江淹留别處幾回春水緑生波落魄情懷自在身得為田野白頭人沽來濁酒還能醉典盡春衣只為貧爭席漁樵渾不識忘機鷗鷺却相親老天有意留殘喘敢歎栖栖寂寞濱胡彥章孝行詩長孫年老齒俱無新婦晨昏事舅姑考叔君前猶舍肉老萊親側故將雛家庭只種忘憂草林木都栖反哺烏莫恨無錢奉甘旨何妨菽水盡歡娛宿紫陽觀次韻故人辛好禮題壁三首偶然來此問丹砂坐聽松風到日斜滿地白羊都化石一聲黃鶴又還家鐵爐火暖煨山藥石鼎茶香試井花壁上舊題皆過客多留姓字後人嗟雛飬胎禽頂轉砂老梅疏影只橫斜儼如蓬島神仙窟勝似玄都道士家犬入丹房偷舐藥鹿遊芝徑誤銜花世間何事纍纍塜華表人歸重嘆嗟煉藥功深九轉砂丹光一道白虹斜淮南雞犬未拔宅徐市童船當到家泰華有蓮皆十丈蓬萊無樹不三花方平親見麻姑説東海揚塵事可嗟嵌峯小隱為憲僉金華滕良載繡衣拂袖歸山去光動嵌峯舊隱居鶴氅不宜秦相印牙籖重整鄴侯書開窗見月呼尊酒入圃看花待板輿猿鶴欣然松菊笑至今狂簡只如初友蘭軒為寧國焦恱民庭前不種間花草九畹遺芳獨向榮既與善人同臭味正宜君子託交情謝家玉樹推前輩栗里黃花愧後生若把三香比三益梅花終讓國香清與韋僉憲同登快閣西昌城下暫維舟快閣同登亦勝遊水碧沙明風不起山青雲白雨初收歸來華表能言鶴飛傍闌干欲下鷗石刻塵昏細摩認蘇黃詞翰至今留次韻陳協和判簿贈祝洞天真人二首騎鶴上天還下天不食煙火自長年屋頭雲氣白於染洞口桃花紅欲然坐壇呼吸走雷電放筆揮灑生雲煙穀城後會定何在他年有約南山邊淮南拔宅上青天自昔經今有幾年羣真復迎緱鶴下百怪却避溫犀然冰甌紅進嵰山雪香爐紫騰沉水煙蓬萊夜半見日出榑桑只在東南邊早歸曈曨旭日散林霏樹下開門露滴衣何處飛來黃蛺蝶繞籬開遍白薔薇斕斑蘚石侵棋路伊軋茅薝響布機稚子山妻悲復喜淵明今得棄官歸送臨濠花仲敷歸覲蒲葉青青蘆笋長渡江遊子駕樓航不期去路成歸路却認他鄉作故鄉水漲淮河魚正賤花開野店酒初香倚門望久清明近急急還家到侍傍山居煙蘿寂寂蔭柴扉路入蒼苔一徑微江燕定巢來是熟巖花結子落還稀修琴有制先抄譜沽酒無錢更典衣採藥山童終日去夜深常與鶴同歸次韻沙允恭感懷二首莫向春風憶舊遊老年懷抱不禁愁自來自去堂前燕相逐相呼樹底鳩行樂有孤靈運屐笑談無復庾公樓武昌門外多官栁能有幾株今尚留前溪一夜漲痕高添得磯頭學坐茅官職已辭如靖節禪心不競似參寥隔簾花影翻紅雨繞屋松聲捲翠濤酒侣詩儔來往熟不妨迂步向西郊對月有懷陳景容見月停杯欲問天劃然長嘯鶴驚眠自從盤古初開闢看到如今幾缺圓往事夢中空已過虛名身後不須傳逺遊寧似歸來好日日瞿塘有覆船答張通山見寄二首莫恨無錢對菊花錦城不及早還家張翰豈為鱸魚膾馬援何慚薏苡車日日行人登劔閣年年芳草遍天涯縱然三徑荒蕪盡尚有埀楊宿暮鴉大江東注入婁淞望斷天涯是五茸萬里風塵雙鬢雪百年昏曉幾聲鐘可知伯樂難為馬莫信諸梁果好龍草木經秋盡搖落後凋惟有嵗寒松李守道芍藥有一莖而雙葩者是日方納壻咸以為瑞錢國録有詩王梧溪為之序一日持卷來求豫題因賦此庭草何由致此祥雲英今日嫁裴航風流總是神仙骨時世都隨富貴粧百子帳開脂粉氣同心帶綰鬱金香爾家翁壻如冰玉慶拜花前舉夀觴送張通山赴楊氏西席通山父老思仇覽絳帳諸生待馬融要見閭閻他日效盡知鄒魯舊時風南船美味來蚶蛤東閣重茵纍豹狨講道從容有餘暇好題佳句寄征鴻寄仲齋并述草堂新居之樂青雲甲第嫌高大却向東皋别業居有地不栽無用樹滿池俱畜可烹魚每因客至呼狂藥只厭人來乞草書時雨桑麻連夜長老農相慶道何如贈鄭有孚八卦元從一畫傳河圖出自洛書前誰於太極言無極數盡先天與後天西蜀君平人服善長安季主史稱賢嗟豫學易空頭白寡過仍思再假年感廢平泉一廢春誰主開過薔薇幾度花惟有夕陽知世態不堪芳草遍天涯鶴仙動説千年事燕子都歸百姓家怪見向來歌舞地何人於此種桑麻登天馬山左瞰風波右石湖雲間隱映見浮屠江山入畫今猶昔嵗月攛梭日又晡醉筆草書登雪候征袍舊繡拂天吳不堪臨别多愁思欵乃聲中聽鷓鴣雲松陸宅之先生以别時容易見時難為起句賦律詩一首送俞原肅之武功豫亦續貂别時容易見時難到手深杯莫放間昔似延平飛劍去今如合浦得珠還新愁不脫詩中意舊淚猶存竹上斑何事匆匆又分手征鞍無計可相攀次韻彞古鼎題報德方丈壁老僧談道席生風納得須彌芥子中雲磬響時經藏轉天花落處篆煙濛上乘高妙無門入正覺分明有路通色本是空空是色誰知非色也非空草堂雜興十首西郊草堂者真率道人耕讀之所也道人寓竹岡東西數年凡一再徙皆郊居焉今草堂與昔之草堂相去又二里許自東而西故有是名以其不常厥居也時出碧雞坊西郊向草堂是則杜拾遺居浣花溪時詩蓋與此偶合非襲以為美號也耕讀餘暇口占近體十首每首以我亦西郊有草堂為起句謂之草堂雜興聊寫其間居自得之趣不圖貽笑於大方家也靜菴高都官見而寵和之且請録于篇端留鎮草堂庶幾後之作者必有如楊汝士者出焉此道人所以望都官而都官復以望衆人也道人者誰隴西董良史也我亦西郊有草堂何須定在碧雞坊桑麻得雨饒生意榆栁參天盡作行居鶴另存間地位種魚新鑿小池塘高情此外猶何慊只少扁舟繫岸傍我亦西郊有草堂旁人錯比百花莊筆牀茶竈皆新置詩卷圖書只舊藏㕓隱寄聲求菊本山僧折簡送椒秧豪華短促如春夢不似田家飯力長我亦西郊有草堂野花山卉四時香小兒學字塗鴉拙奴子應門抵鶴長自毁茶經高陸羽不傳琴散陋嵇康太平朝野無遺佚獨為才疏得豹藏我亦西郊有草堂石為階砌土為墻竹間碁局消長夏樹底胡牀候晚涼五月新絲登杼柚四時佳果當餱糧逺遊多少忘歸客日日卭崍與太行我亦西郊有草堂超然與世欲相忘興來得句追陶謝間去抄書補漢唐東里花開時獨往南鄰酒熟每先嘗浮生已是中年後鏡裏何嫌鬢髮蒼我亦西郊有草堂緑陰門巷麥風涼繅車索索鳴中廇煙火依依接近疆溪女纈裙提甕汲鄰翁挾爼隔田穰熙熙實有先民樂不比桃源事渺茫我亦西郊有草堂時從野老話農桑匏瓜足食何憂饉檿柘新栽莫漫傷架上法書兼魏晉案間諸子雜荀揚朝耕夜讀吾儒事可不焚膏繼夕光我亦西郊有草堂蒼苔滿徑石田荒燈前夜寂妻兒語場下秋晴老弱忙細紡木綿登市價先礱䆉稏納官倉開門不見徵租吏便是田家一小康我亦西郊有草堂槿花籬落幾斜陽過橋野色分江斷繞屋禽聲得樹藏椰子作杯傾緑醑鱸魚斫膾抹紅薑應門只為溪童懶客至長令倒屣忙我亦西郊有草堂梅花紙帳竹筐牀茅柴味薄蔥椒烈榾柮煙消芋栗香為著殘棊知勝負因觀通鑑識興亡何須抵死憂身外萬事無如醉作鄉送顒天際入南禪結茅來住水雲邊面壁工夫幾嵗年已悟佛乘無小大不知人事有推遷江湖逺迹應俱掃雨露恩深豈獨偏井上轆轤移得去鉢盂到處濯清泉送錢文規回鳳陽遊子草年來故鄉里閭訪舊半存亡買羊上冢逢寒食騎鶴纒腰對艷陽花信風高紅雨急濠梁水暖白魚長江南父老臨門待帶得親知字幾行清明前二日林泉過豫西郊留宿草堂晚步賦詩因次其韻犬吠雞鳴逹四郊依依煙火疊相交時光暗轉催農事海味初來贍客庖細栁緑欺臨水樹小桃紅傲出墻梢子雲寂寞甘衰朽更有何心作解嘲寄章彥才不見故人三十年偶聞近况客談邊生涯牢落身猶健壯志蹉跎髮已宣昔日孩提今跨竈暮年伉儷續調絃舊遊蹤迹都如夢覓紙題詩意惘然次韻林泉留宿草堂感舊時光物色易推遷虛度青春五十年晝夜本無間日月古今同是此風煙伯鸞幸喜妻能敬世績惟憂子不賢若問龎公身後事遺安空有鹿門田題張伯英畫江山如畫只依然陳迹分明在眼前茉莉花開還滿路荔枝樹老又增年巖中有客攜家隱馬上何人衣錦還信是閩鄉文物盛長歌短句錦連篇菊莊為陳孟宣茜水塘西第一家竹籬茅屋枕鷗沙數株畫意婆娑栁三徑幽香隱逸花彭澤郎官存故事吳門老圃共生涯從來因得延年力晚節優遊鬢未華醉吟四首俯仰視茫茫天地如許大不知有何物更在天地外日月相代明西沒復東出昨夜又今朝四序常不失大海渺無垠自非人力為天作與地設古有何人知自從有天地人事幾遷改更過百年期今人誰復在小山叢竹四首雖云覆簣功崒嵂若天産自怡道人心不供俗子眼有仙何必高神會即嵩華岷峨縱在前當使入我跨地偏人迹稀林靜鳥聲樂松留石上陰竹解風前籜去濕茱萸酒扶衰枸杞茶滿山屯玉氣平地出丹砂倪元鎮畫地僻無人掃亭前長緑苔不知丁氏鶴何日可歸來曺雲西畫貞溪人如玉詩畫清無比至今溪上人不唾溪中水顧定之墨竹二首木脫百草枯此君有貞節獨於嵗寒時居然傲霜雪種竹何必多無則令人俗蕭蕭一兩竿清風自然足次韻仲基春來雜思十首月在攝提格天回甲子春麻姑多夀算幾見海揚塵溪艇瓜皮小沙隄鏡面光梨花能雪白栁色賽鵝黃鵝眼穿榆莢兒拳怒蕨芽不知王謝燕此日在誰家南風又北風今日非昨日草暗習家池苔乾謝公屐好花容易褪惡草自然生我亦徙憎愛無情對有情楊栁低金縷鸕鷀灧玉蛆縱無山簡馬也伴倒騎驢去日云燕趙書來又豫梁東鄰抱兒婦猶恨嫁行商酒勸杯杯覆棋看局局新黃金空傳世白髮肯饒人雨連三月久春剩一分多暮醉兼朝醉長歌復短歌水面落花紅天涯芳草緑王孫歸不歸此恨何時足畫扇二首世態有古今江山本無異相逢俱隱淪所問知何事軋鴉渡江船㾕􅂒臨關馬蕭寺罷晨鐘殘雪尚飄灑折枝牡丹沉香寂寞久無歡何况楊家百寶闌池館買栽誰到老不如聊寫折枝看墨菊二首夕餐始見楚人辭晚遇柴桑亦賦詩何似顓工寫秋色金壺墨汁更淋漓三徑荒蕪靖節歸緇塵暗眼蝶來稀義熙心事如前日秖恨黃花與昨非楓橋夜泊野店沽來酒欠濃客愁今夜又相逢江楓漁火都禁得只怕寒山寺裏鐘墨梅雨枿煙梢筆意新東塗西抹宛如真冰肌玉骨渾非舊别是孤山一種春雪煮茶三首梅雪軒中雪煮茶一時清致更無加銷金帳底羊羔酒莫向陶家説黨家梅雪軒中雪煮茶倚闌和雪看梅花新年第一逢清賞當作人間勝事誇梅雪軒中雪煮茶無人知此淡生涯肩輿迎送勞煩主比似山陰興不賖捕魚圖道士磯頭春雨晴桃花水漲栁風輕妻孥不缺魚羮飯何必人間利與名美人鏡中影畫中元是鏡中人看畫何如覽鏡親若使果然能解語便於紙上喚真真豫讓生不匡君死報君趙襄未害殺忠臣頭非自漆誰能漆愧爾何勞更漆身宋太祖雪夜幸趙普第風雪開門夜甚寒此來非但一尊歡江南果是他家物豈可容人卧側鼾東坡赤壁圖月明風細水無波客有吹簫自倚歌東望武昌西夏口山川如此感懷多子猷訪戴雪夜乘舟意似癡一時狂態竟誰知非關興盡空歸去自覺無由見戴逵間情二首酒灧珍珠白玉缸多情蛺蝶小紅窗深深各出穿花去還復飛來各一雙暑渴消時酒半醒自調冰水貯銀瓶夕陽又帶梧桐影過到窗間第二櫺芭蕉士女二首惜春情重減香肌正及提孩學步時莫道芭蕉通換葉已無一筆舊題詩春來心事恐人知懶寫芭蕉葉上詩記得霓裳新樂譜晚涼偷按玉參差次韻俞原舉雪中見寄五首草堂真率更無加懸榻待君能幾家梅雪軒中春有約莫教孤負海棠花搖落空山無茂林僅餘松柏嵗寒心洛陽聞掃城中雪只有袁安住處深雪繞鴛湖景絶塵王恭鶴氅倍風神此時為子遙相憶欲作山陰訪戴人西郊風雪滿天時坐隱烏皮獨爾思書札未來先得喜鵲聲偏在傍簷枝過鴈無憑望欲迷春波只隔五茸西相思此夜何終極月在青天水在溪夜坐金鴨香殘猶有燼銀臺燭滅僅留心夜深月到薔薇架斜送窗間一角陰效秦文仲絶句四首文淵閣下隨朝士右順門西待詔人中使口傳鑾駕出各將封事御前陳日上東華暖霧開御河金水碧於苔內廷擎出青涼繖知是黃門進膳來朱衣繡襖織金花寶蓋仙幢擁翠華文武班齊天樂奏龍頭小輦載官家百官朝罷乘輿還階下龍媒立仗間燕避罘罳風不動黃金宫闕五雲間金陵懷古橋逢朱雀題無柱巷入烏衣住有人野老不知前代事却嫌過客問梁陳早發安慶喜得順風船頭奔浪響潺潺雪捲雲翻洶湧間只恐好風帆去疾匆匆過却小孤山次韻濓溪先生題羅天巖詩有引雩之南山有巖曰羅天者濓溪先生暇日燕遊之所也先生通判贑州故嘗往來于此嘗有詩云聞有仙巖即去尋遍隨雲路入松陰雖然不及洞中景終異人間名利心後之好事者從而勒諸石建書院以祠之玉霄滕公待制又為之記蓋欲其久逺而傳諸不朽也自罹兵燹名實俱廢蕪沒不知其所矣豫以巡按至雩都學諭黃君輔為豫道其事且能誦其詩使人一唱三歎欲求其迹而不可得也敬步遺韻用致想像髣佛之意云咫尺仙巖不可尋甘棠何處閟清陰洞門只在煙蘿裏無路攀緣枉費心過郎當嶺郎當嶺外分司馬惶恐灘頭奉使船到處不如歸去好南窗寄傲北窗眠次韻張林泉兄弟倡和三首一車南去兩帆西白首林泉獨短藜為問閩中聽謝豹何如清夜楚猿啼友于情重尺書稀各向西風怨落暉腸斷幾聲嘹嚦鴈如何不作一行飛别來幾度菊花黃三徑至今渾未荒再見不無存沒感登高更忍作重陽丙寅嵗旦試筆僂指浮生半百過少年豪氣漸消磨人來獻嵗無他祝鄉里衣冠剩不多趙松雪承旨瘦馬圖將軍老去已封侯汗血功成百戰秋得放華陽春草裏黃金何必更籠頭聞鵲昨夜燈花旦鵲聲不知有意與無情丁寧稚子應門去今日人來好出迎王母醉歸圖玉麋馱醉夜闌珊又是瑶池赴宴還青鳥只通方朔信如何再不到人間二喬圖喬家姊妹盡知書宫樣雲鬟學得梳雖在流離歡亦足中郎有女不能如伍胥廟誰載西施出五湖一朝麋鹿上姑蘇後人説起亡吳恨猶向臺邊酹子胥華清池幸蜀殃根在一身香囊忍委馬嵬塵池中只有殘湯水不見當時出浴人昭君圖莫恨丹青畫不真後宫那得更無人和親果是寧邉計何惜區區妾一身貴妃襪脫下凌波一瓣蓮當時擲棄馬嵬前偶然老媪收藏得猶有癡人費看錢渡船老翁送人北去又南來路口埀楊眼見栽自有此船搖此渡幾回到岸幾回開贈隱者張山人蒲團竹榻烏皮几羽扇綸巾鶴氅衣不獨市朝無此客山間林下見應稀友人續絃煎得鸞膠續斷絃玉臺新鏡更團圓劉晨合有神仙分尋著桃源洞裏天題扇次韻姚比玉甫里西來笠澤東扁舟髣佛似龜蒙舊時記得相逢處恰與如今畫裡同深溪隱居圖為廣東參議金華王公正故家百年喬木陰清泠莫測深溪深珊瑚已受釣竿拂風雨時時龍一吟題姚淡如畫扇寄梁彥思大尹青山深處白雲多茅屋依然在澗阿借問隱君歸去後故園秋色近如何春山曉思圖為僉憲林彥恭閣雨輕雲已㺯晴窗間曙色漸分明幽人正被宿酲惱啼鳥隔簾三四聲題扇蹇驢乘興雪中來踏遍江村不見梅咫尺有無須一到寒香寥落寺門開題畫二首凍雲壓樹雪漫山楚尾吳頭髣佛間日暮天寒鳥飛絶此翁何事却忘還春山寂寂鳥不鳴阿咸自求絃上聲更無知音一賞遇胸次磊磈難為平庚午除夕風雨大作因思壬戌嵗除在按察司官舍無異今夕瞬息之間已及九載慨今念昔不能無懷遂賦此向來除夕燈前雨身在他鄉憶草堂今夜草堂還守嵗燈前聽雨説他鄉與太常典簿顧謹中題畫二首髣佛風煙笠澤東吳山不與越山同誰家樓閣停歌舞舊是夫差避暑宫滕王高閣倚江潯畫棟珠簾嵗月深南浦西山晴復雨後人朝暮幾登臨次韻丁和仲草書入聖過張顛筆底龍蛇勢宛然路破草堂鐵門限人來乞字不論錢題畫一從劉阮離天台洞口桃花幾度開知道再無相見日當時不放出山來次韻沈文舉為鳳陽錢文規題畫一自移家禹會村十年不出草堂門舊時桑梓今看盡夜夜九山勞夢魂盛叔彰山水山北山南秋復春扁舟為屋樹為鄰誰能學得天隨子老向江湖作散人靈巖寺採香無徑草茸茸響屧廊頭語候蟲今日梵王龍象地行人猶説館娃宫題畫四首江蛟上岸作樹立月下風前號鬼神山澤幾年無隱逸衣冠夜出是何人或時風雨或時晴任我漁舟到處行朝去暮來頭自白水光山色有何情偶然行到水窮處隔岸無船人不渡白雲出岫已多時夕陽猶在西嵒樹流水響時石礙好山缺處雲遮咫尺溪橋過去茂林修竹誰家斜塘晚泊路入斜塘日已昏田家犬吠出籬根老翁開户驚相問何處船來夜識村題畫五首罷釣歸來不汝期無心説起爛柯時仙家嵗月真如許也向山中看奕碁水光山色曉蒼茫逺樹浮嵐寺半藏還盡夜來聽雨債片帆今日過瀟湘鼓瑟齊門事已非抱琴何惜賞音稀有絃爭似無絃逹間看間雲出岫飛江上青山可隱居釣船到處有鱸魚姓名却在人間世只恐安車詣草廬門外數株韋偃樹屋頭一帶巨然山江南舊日經行處多有人家似此間書所見二首下馬見人頭不低青樓日日醉如泥杏花壇上摴蒱散又向城東看鬬雞睂掃春山髻綰雲銀條紗䙏藕絲裙倚闌跛立嬌無語手托香腮酒半醺打姑惡二首有樹莫容姑惡栖爾何怨姑猶怒啼人家有兒亦有婦不願使聞如爾妻姑惡何惡怨未終世人至今無此風爾啼莫來近我屋我姑不與爾姑同題扇無人學得廣陵散月白風清試一彈萬籟不鳴羣動息九霄雲外舞青鸞屛風畫意二首杏花如錦栁如絲髣佛西湖二月時詩意不過模畫意何須畫裏更題詩一畨雨過一畨涼紅藕花開滿屋香四面闌干都傍水倒看雲影度天光附寬河書後寄周仲鼒父子二首始終情意兩蹉跎離恨雖多話亦多只有蒨溪溪上月照人一直到寬河不是無心不寄書越添煩惱寄何如那堪一一從頭寫欲寄還休意有餘栁下漁舟栁陰日日繫漁舟漁婦漁翁盡白頭樹已半枯人亦老更堪落葉幾畨秋間居二首茂林修竹是吾廬身已無官也自如蒔藥種花筋力倦北窗高枕教兒書風雨連朝不出門晚來步屧看溪痕不知筍過鄰家去籬落新添竹幾根夢茂名兄二首乙卯夏四月二十有一日庚戌之夜豫既夢茂名兄次夕復夢焉明日姪澤以其兄治所貽書來告曰近見侍儀介公言茂名縣地已併屬高州治在任官僚皆改除若翁則升倅贑州府矣此説得之衢人語雖未可必信又安知不為疇昔見夢之一驗歟因賦二絶以紀其事徴果否於他日云兩夜郎官入夢頻今朝報喜應斯人侍儀豈是無憑語只恐衢州信未真久無書札報平安正懼蠻方撫字難喜見故人親口説近時已轉贑州官夢得洛容兄書乙卯九月十七日夜豫夢得洛容書寤而呼婦語之而婦夢亦同因志于壁又五越月然後得書視其發書日正所夢之日也感而紀其異云我與細君同夢夜洛容縣裏發書時至誠有感通天地萬里歸音一夕知别姪董時雨二首豫與時雨姪同以有司貢舉來京師至是豫巡按江西時雨得歸侍飬詩以識别併用示兒浩云與汝同來汝獨歸丁寧語别寸心違丹陽車子龍江舸明日東西各自飛強近無親骨肉稀糟粳有婦不勝衣到家説與癡豚犬好護瓜田待我歸次韻俞東村見示四首草茅蔽野出無蹊寥落衡門水竹西客至尚能留一飯小兒沽酒婦蒸藜自述草堂之陋池塘春草夢依依明月清風半掩扉今夜燈花何太喜多應洱海有書歸憶弟季明宗親零落重期功馬首何時得向東二十年來鄉里變半登鬼籙半稱翁憶武功兄今夜平分一半秋可憐兄弟不同遊片雲將雨非無意天上姮娥亦為愁中秋對雨與俞原肅留别十首并引原肅貴介將復之武功令弟仲基乃摘古人詞中語以别時容易見時難為起句既賦律詩一首亦效顰復作十絶用代折栁之贈吁吾老矣於其行也不能無所感焉夫原肅去家二十年僅能一拜丘隴訪其族人故舊所存十無二三而今而後使原肅更二十年而歸不知吾能及見否也是則可悲也雖然後會倘有期亦當出此以發一笑别時容易見時難莫作尋常客子看二十年來逢一度四千餘里到長安别時容易見時難愁上心來有萬端傳語不如親會面臨行欲發又盤桓别時容易見時難對酒當歌且盡歡不就目前同一醉明朝何處盻征鞍别時容易見時難屈指凡經草嵗寒更去更來能幾度并州已作故鄉看别時容易見時難渺渺春江送木蘭三疊陽關休唱盡一聲凄楚一心酸别時容易見時難無計相留看牡丹去向洛陽城裏過不知何處可憑闌别時容易見時難和恨和愁寫一攤若遇後來相憶處聊將紙上筆蹤看别時容易見時難我釣吳淞爾釣磻遮莫子牙鈎餌大四腮風味屬張翰别時容易見時難芳草萋萋不忍看况是春深無鴈過到家誰與寄平安别時容易見時難兩地相思總一般世上此情何日已除非石爛海波乾偶題三首東風細雨濕窗紗日晏黃蜂未報衙芳草滿庭隨意緑時時吹落碧桃花小徑斜穿入竹林曲闌通轉亞花陰墻隈回得風如旋落地殘紅幾許深青石闌干繞曲池株株楊栁倒埀絲水心亭上鈎簾坐魚唼殘花口動時夜泊江上鴈呌霜汀鵲繞枝夜長無寐客眠遲一燈隔岸漁船火愁似江楓對照時匡方人家流水濺濺白石灘疏林紅葉半凋殘溪邊略彴山前屋如在黃筌畫裏看寒江漁者浮家一葉小如梭前載兒孫後載婆今日天寒難下網蘆花深處避風波修竹芙蓉四首芙蓉花老碧波寒竹上湘妃淚未乾日落黃陵廟前路如今髣佛畫中看十二峯頭月欲昏陽臺夢裡舊精魂至今猶恨湘江水不為娥皇洗淚痕竹上當年淚未消又將紅粉濕鮫綃月明聽鼓雲中瑟魂斷蒼梧尚可招黃陵廟前湘水深蒼梧人去杳難尋西風灑遍啼紅淚竹上斑斑恨至今除夕與仲齋守嵗語及鄉中遷客有感賭酒搏拳夜甚譁故人屈指半天涯梅花冷笑東風裏守嵗開筵有幾家閨思二首病酒傷春十日過爪痕不敢露金訶莫令鸚鵡知消息鸚鵡人前最口多博山無火膽瓶空何處香來别院中應是叉頭新茉莉隔簾微度扇車風堪笑二首畢竟長生藥不真世間誰是百年人貪夫務得知何意似欲黃金鑄此身自古興亡有數存銅駝曽見棘中蹲贊皇謾述平泉記猶欲丁寧戒子孫無題二首蜘蛛結網為何忙作繭春蠶自速亡只有蜜蜂甜得味終身受用百花香泛泛人心獸不如陸家黃耳解傳書殘唐亦有孫供奉恥向東梁致起居懷季明大政二鄉友鄉里衣冠日漸稀故人又去著戎衣塞翁得失皆前定莫向如今怨昨非與張鍊師共飯而雙鶴來舞道人邀我飯胡麻分得安期棗似瓜何處召來雙白鶴直從天上玉皇家偶書太行幾日為平地巫峽何年是坦途三見揚塵東海底誰能有眼似麻姑寄延平西芹河泊所官姪時雨十首殷勤慈母手中線念子出門當逺遊記得臨行密縫意白雲飛處一回頭蠻郎舌作南人語蠻娘髻效北人梳新官到任意未愜禁得滿山啼鷓鴣昔年雷煥豐城劒化作雙龍入水中去後不知誰復見殷勤為我問漁翁西芹女兒茜裙衣插花來迎官長妻低頭拜跪多禮數言語不通如鳥啼淡菜蛤蜊商販到荔支圓眼福州來肩輿盡日行山谷滿路蘭花不用栽榕陰布地晚生涼風扇叉頭茉莉香通印子魚初未識得來惟共細君嘗官機白苧裁將樂時樣烏紗學在京當暑著來爭道好不勞揮扇也心清出焙好茶閩上有帶漿新荔浙西無異鄉美味都嘗遍只欠松江巨口鱸樹頭柑子如盆大地上蘭花似草多官舍日高初睡起隔窗人語是鸚哥漿調紫蔗宜新壓葖絮紅糟已慣嘗在任久居諳土俗方音食性逐他鄉效香奩體二首碧桃落盡海棠開簾幕春深燕子來心為惜花身病酒一牀絃索鎖塵埃花影重重上繡簾日高針線已慵拈試將紅葉題詩了間把金鎞剔指尖集句次韻俞東村四首痛飲狂歌空度日感時心緒杳難平不堪吟罷東回首水閣春寒陰復晴幽居悄悄何人到一點山螢照寂寥欲寄所思無好信夷歌幾處起漁樵蒹葭楊栁似汀洲細草春香小洞幽風景蒼蒼多少恨煙波江上使人愁黃昏溪上語人稀零落交遊我獨悲有約不來過夜半誰收松下著殘碁初度日自况清平樂二闋今朝初度俗狀渾如故只是朱顔偷叛去白髮新添無數休將事挂心懷天公自有安排同在金門通籍幾人如我歸來今朝初度敢道儒冠誤造物拘人元有數不是青雲無路團欒稚子山妻尋常淡飯黃虀日晏枕邊啼鳥何如馬上朝雞觸事感懷糖多令舉眼便凄涼寒鴉噪夕陽二十年多少興亡花榭栁臺無片瓦歌舞地放牛羊往事莫思量説來愁斷腸舊時人都在他鄉但得酒杯長在手終日醉何妨次韻張夢辰秋感臺城路木犀花落芙蓉綻知他鴈門開未金谷園中平泉莊上又見許多興廢今非昔比試仔細思量越添憔悴怕上髙樓夕陽山外水東逝重經王謝鄰里尚依然認得門巷還是車馬誰來管絃何在惆悵盛筵難繼吾生老矣比宋玉愁多更加一倍月到窗前滿城砧韻起春思點絳唇睡起鴛幃緑紗窗外鶯啼曉海棠開了簾幕春寒悄誰在秋千却是風來裊睂慵掃情懷不好鬬甚間花草自警驀山溪人生如寄休作千年調七十古來稀有那箇長生不老冨貧貴賤都是命安排從姦狡誰能保一世常常好如今眼底故舊看看少客至便須留管甚麼杯盤草草光陰後去畢竟已無多頭白了無分曉費甚間煩惱西郊笑端集卷一
