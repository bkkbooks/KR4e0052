body:
  text: 西郊笑端集别集類五明提要臣等謹案西郊笑端集一巻明董紀撰紀字良史以字行更字述夫上海人洪武壬戌舉賢良方正廷試對策稱㫖授江西按察使僉事未㡬告歸築西郊草堂以居因即以名其集然未及鋟板稿藏其門人周鼎家成化中鼎孫光祿寺少卿庠始為刋印此本有宣徳辛亥鼎後跋又有成化戊子錢溥序葢又従庠刻本傳寫者也紀詩平易樸實視袁凱諸人稍為不逮故張汝弼作是集序謂其漫爾而仕漫爾而歸詩文亦漫爾而著弗冀有傳頗致微詞而朱彛尊靜志居詩話則舉其題海屋詩過橋雲磬天台寺泊岸風帆日本船句謂亦不為率漫然紀集明世未經再刻流播頗稀明史藝文志亦闕而不載彛尊明詩綜所錄但採之賴良大雅集中未及見其全帙故所摘佳句僅此今觀此集過質傷俚之弊誠所不免然其合作徃徃得元白張王遺意汝弼以一格繩人不足以盡詩體彛尊執一二語以争之亦未盡紀所長也乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2dfa6f08996ba56010a6cd7d04ee9c8cf05d836d354b0abda4c84e25b0d5db9b
